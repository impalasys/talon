providers:
  openai:
    type: openai
    model: gpt-4.1-mini
    api_key:
      source: env
      key: OPENAI_API_KEY
  novita:
    type: openai_compatible
    name: novita
    base_url: "https://api.novita.ai/v3/openai"
    model: google/gemma-4-31b-it
    api_key:
      source: env
      key: NOVITA_API_KEY

server:
  host: "0.0.0.0"
  port: 18789

control_plane:
  database:
    driver: postgres
    url:
      source: env
      key: POSTGRES_URL
  message_broker:
    driver: gcp_pubsub
    project_id:
      source: env
      key: GCP_PROJECT_ID
