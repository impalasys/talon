syntax = "proto3";

package talon.manifests;

import "google/protobuf/struct.proto";

// Metadata for finding and grouping manifests
message ObjectMeta {
  string name = 1;
  string namespace = 2;
  map<string, string> labels = 3;
  map<string, string> annotations = 4;
}

// -----------------------------------------
// Agent Template
// -----------------------------------------

message AgentTemplate {
  string api_version = 1;
  string kind = 2;
  ObjectMeta metadata = 3;
  AgentDefinition definition = 4;
}

message AgentSpec {
  repeated Feature features = 1;
  ModelPolicy model_policy = 2;
  string system_prompt = 3;
  repeated string mcp_server_refs = 4;
  map<string, google.protobuf.ListValue> capabilities = 6;
  A2A a2a = 7;
}

message AgentDefinition {
  oneof source {
    AgentSpec custom_spec = 1;
    TemplatedAgentSpec templated = 2;
  }
}

message TemplatedAgentSpec {
  string template_name = 1;
  AgentSpecDelta delta = 2;
}

message AgentSpecDelta {
  ModelPolicyDelta model_policy = 1;
  PromptDelta system_prompt = 2;
  FeatureSetDelta features = 3;
  StringListDelta mcp_server_refs = 4;
  CapabilitiesPolicyDelta capabilities = 6;
}

message PromptDelta {
  oneof operation {
    string replace = 1;
    string prepend = 2;
    string append = 3;
  }
}

message FeatureSetDelta {
  repeated Feature upsert = 1;
  repeated string remove = 2;
}

message StringListDelta {
  repeated string replace = 1;
  repeated string add = 2;
  repeated string remove = 3;
}

message CapabilitiesPolicyDelta {
  map<string, google.protobuf.ListValue> replace = 1;
}

message Feature {
  string name = 1;
  string type = 2;
  bool required = 3;
}

message Model {
  string provider = 1;
  string name = 2;
  float temperature = 3;
  ThinkingConfig thinking = 4;
}

message ThinkingConfig {
  bool enabled = 1;
  optional uint32 budget_tokens = 2;
  string effort = 3;
}

message ModelProfile {
  string name = 1;
  Model model = 2;
}

message ModelPolicy {
  repeated ModelProfile profiles = 1;
}

message ModelPolicyDelta {
  repeated ModelProfile upsert = 1;
}

message McpServer {
  string api_version = 1;
  string kind = 2;
  ObjectMeta metadata = 3;
  McpServerSpec spec = 4;
}

message McpServerSpec {
  string transport = 1;
  string target = 2;
  repeated string args = 3;
  map<string, string> headers = 4;
  bool disabled = 5;
}

message McpServerBinding {
  string api_version = 1;
  string kind = 2;
  ObjectMeta metadata = 3;
  McpServerBindingSpec spec = 4;
}

message McpServerBindingSpec {
  string server_ref = 1;
  repeated string args = 2;
  map<string, string> headers = 3;
  bool disabled = 4;
  McpAuthBrokerSpec auth_broker = 5;
  repeated string allowed_tool_names = 6;
}

message A2A {
  repeated Connection connections = 1;
}

message Connection {
  string name = 1;
  string description = 2;
  ConnectionRef target = 3;
  repeated string input_modes = 4;
  repeated string output_modes = 5;
  uint32 timeout_seconds = 6;
  uint32 max_depth = 7;
  ConnectionAuth auth = 8;
}

message ConnectionRef {
  oneof target {
    InternalConnectionRef internal = 1;
    ExternalConnectionRef external = 2;
  }
}

message InternalConnectionRef {
  string namespace = 1;
  string agent = 2;
}

message ExternalConnectionRef {
  string agent_card_url = 1;
}

message ConnectionAuth {
  string kind = 1;
  string secret_ref = 2;
}

message AgentCard {
  string api_version = 1;
  string kind = 2;
  ObjectMeta metadata = 3;
  AgentCardSpec spec = 4;
}

message AgentCardSpec {
  string agent_ref = 1;
  string hostname = 2;
  string name = 3;
  string description = 4;
  string version = 5;
  AgentCardCapabilities capabilities = 6;
  repeated string default_input_modes = 7;
  repeated string default_output_modes = 8;
  repeated AgentCardSkill skills = 9;
  AgentCardAuth auth = 10;
}

message AgentCardCapabilities {
  bool streaming = 1;
  bool push_notifications = 2;
  bool extended_agent_card = 3;
}

message AgentCardSkill {
  string id = 1;
  string name = 2;
  string description = 3;
  repeated string tags = 4;
  repeated string examples = 5;
  repeated string input_modes = 6;
  repeated string output_modes = 7;
}

message AgentCardAuth {
  string discovery = 1;
  string operations = 2;
}

message McpAuthBrokerSpec {
  string kind = 1;
  string url = 2;
  int32 cache_ttl_seconds = 3;
  string audience = 4;
}

message Knowledge {
  string api_version = 1;
  string kind = 2;
  ObjectMeta metadata = 3;
  KnowledgeSpec spec = 4;
}

message KnowledgeSpec {
  string path = 1;
  string content = 2;
}

// -----------------------------------------
// Memory Provider
// -----------------------------------------

message MemoryProvider {
  string api_version = 1;
  string kind = 2;
  ObjectMeta metadata = 3;
  MemoryProviderSpec spec = 4;
}

message MemoryProviderSpec {
  string driver = 1;
  ConnectionConfig connection = 2;
  SchemaConfig schema = 3;
}

message ConnectionConfig {
  EnvSecret url = 1;
  PoolConfig pool = 2;
}

message EnvSecret {
  string source = 1;
  string key = 2;
}

message PoolConfig {
  int32 max_connections = 1;
  int32 min_connections = 2;
  int32 idle_timeout_seconds = 3;
}

message SchemaConfig {
  string name = 1;
}
