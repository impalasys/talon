syntax = "proto3";

package talon.v1;

import "proto/data/data.proto";
import "proto/events.proto";

service SessionService {
  rpc Create(CreateSessionRequest) returns (SessionResponse);
  rpc Get(GetSessionRequest) returns (SessionResponse);
  rpc List(ListSessionsRequest) returns (ListSessionsResponse);
  rpc ListMessages(ListSessionMessagesRequest) returns (ListSessionMessagesResponse);
  rpc Delete(DeleteSessionRequest) returns (DeleteSessionResponse);
  rpc Clear(ClearSessionRequest) returns (ClearSessionResponse);
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc AppendMessage(AppendSessionMessageRequest) returns (AppendSessionMessageResponse);
  rpc AnswerPermission(AnswerSessionPermissionRequest) returns (AnswerSessionPermissionResponse);
  rpc StopGeneration(StopSessionGenerationRequest) returns (StopSessionGenerationResponse);
  rpc StreamParts(StreamSessionPartsRequest) returns (stream talon.events.SessionMessagePartEvent);
  rpc StreamPartsBatch(StreamSessionPartsBatchRequest) returns (stream talon.events.SessionMessagePartEvent);
  rpc SubmitTurn(SubmitSessionTurnRequest) returns (stream talon.events.SessionMessagePartEvent);
}

message CreateSessionRequest {
  string agent = 1;
  string ns = 2;
  map<string, string> labels = 3;
}

message GetSessionRequest {
  reserved 5;
  reserved "step_limit";

  string session_id = 1;
  string agent = 2;
  string ns = 3;
  int32 message_limit = 4;
}

message ListSessionMessagesRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
  int32 page_size = 4;
  optional string before_message_id = 5;
}

message ListSessionMessagesResponseItem {
  reserved 2;
  reserved "steps";

  talon.data.SessionMessage message = 1;
}

message ListSessionMessagesResponse {
  string session_id = 1;
  string agent = 2;
  string state = 3;
  repeated ListSessionMessagesResponseItem items = 4;
  bool has_more = 5;
  optional string next_before_message_id = 6;
}

message ListSessionsRequest {
  string agent = 1;
  string ns = 2;
}

message SessionListItem {
  string session_id = 1;
  int64 updated_at = 2;
  map<string, string> labels = 3;
}

message ListSessionsResponse {
  repeated string session_ids = 1;
  repeated SessionListItem sessions = 2;
}

message SessionResponse {
  reserved 5;
  reserved "steps";

  string session_id = 1;
  string agent = 2;
  string state = 3;
  repeated talon.data.SessionMessage messages = 4;
  map<string, string> labels = 6;
}

message DeleteSessionRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
}

message DeleteSessionResponse {
  bool success = 1;
}

message ClearSessionRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
}

message ClearSessionResponse {
  bool success = 1;
}

message SubmitSessionTurnRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
  talon.data.SessionMessage message = 4;
  map<string, string> labels = 5;
}

message SendMessageRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
  string message = 4;
  map<string, string> labels = 5;
}

message SendMessageResponse {
  string reply = 1;
  string session_id = 4;
}

message AppendSessionMessageRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
  talon.data.SessionMessage message = 4;
}

message AppendSessionMessageResponse {
  string session_id = 1;
  talon.data.SessionMessage message = 2;
}

message AnswerSessionPermissionRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
  string request_id = 4;
  string outcome = 5;
  string option_id = 6;
  string decided_by = 7;
}

message AnswerSessionPermissionResponse {
  string session_id = 1;
  string request_id = 2;
  string outcome = 3;
  string option_id = 4;
}

message StopSessionGenerationRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
}

message StopSessionGenerationResponse {
  bool success = 1;
}

message StreamSessionPartsRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
}

message StreamSessionPartsBatchRequest {
  repeated string session_names = 1;
}
