syntax = "proto3";

package talon.v1;

service NamespaceService {
  rpc Create(CreateNamespaceRequest) returns (NamespaceResponse);
  rpc Get(GetNamespaceRequest) returns (NamespaceResponse);
  rpc Delete(DeleteNamespaceRequest) returns (NamespaceResponse);
  rpc List(ListNamespacesRequest) returns (ListNamespacesResponse);
}

message CreateNamespaceRequest {
  string name = 1;
  bool recursive = 2;
  map<string, string> labels = 3;
}

message GetNamespaceRequest {
  string name = 1;
}

message DeleteNamespaceRequest {
  string name = 1;
}

message ListNamespacesRequest {
  optional string parent = 1;
}

message NamespaceResponse {
  string name = 1;
  optional string parent = 2;
  bool is_deleted = 3;
  int64 deleted_at = 4;
  map<string, string> labels = 5;
}

message ListNamespacesResponse {
  repeated NamespaceResponse namespaces = 1;
}
