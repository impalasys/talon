syntax = "proto3";

package talon.v1;

import "proto/data/data.proto";
import "proto/events.proto";
import "proto/resources/resource.proto";

service NamespaceService {
  rpc Create(CreateNamespaceRequest) returns (NamespaceResponse);
  rpc Get(GetNamespaceRequest) returns (NamespaceResponse);
  rpc Delete(DeleteNamespaceRequest) returns (NamespaceResponse);
  rpc List(ListNamespacesRequest) returns (ListNamespacesResponse);
}

service ResourceService {
  rpc Create(CreateResourceRequest) returns (ResourceResponse);
  rpc Get(GetResourceRequest) returns (ResourceResponse);
  rpc List(ListResourcesRequest) returns (ListResourcesResponse);
  rpc Delete(DeleteResourceRequest) returns (DeleteResourceResponse);
}

service SessionService {
  rpc Create(CreateSessionRequest) returns (SessionResponse);
  rpc Get(GetSessionRequest) returns (SessionResponse);
  rpc List(ListSessionsRequest) returns (ListSessionsResponse);
  rpc ListMessages(ListSessionMessagesRequest) returns (ListSessionMessagesResponse);
  rpc Delete(DeleteSessionRequest) returns (DeleteSessionResponse);
  rpc Clear(ClearSessionRequest) returns (ClearSessionResponse);
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc AppendMessage(AppendSessionMessageRequest) returns (AppendSessionMessageResponse);
  rpc AnswerPermission(AnswerSessionPermissionRequest) returns (AnswerSessionPermissionResponse);
  rpc StopGeneration(StopSessionGenerationRequest) returns (StopSessionGenerationResponse);
  rpc StreamParts(StreamSessionPartsRequest) returns (stream talon.events.SessionMessagePartEvent);
  rpc StreamPartsBatch(StreamSessionPartsBatchRequest) returns (stream talon.events.SessionMessagePartEvent);
  rpc SubmitTurn(SubmitSessionTurnRequest) returns (stream talon.events.SessionMessagePartEvent);
}

service ChannelService {
  rpc PostMessage(PostChannelMessageRequest) returns (PostChannelMessageResponse);
  rpc GetMessage(GetChannelMessageRequest) returns (ChannelMessageResponse);
  rpc ListMessages(ListChannelMessagesRequest) returns (ListChannelMessagesResponse);
  rpc StreamEvents(StreamChannelEventsRequest) returns (stream talon.events.ChannelEvent);
}

service WorkflowService {
  rpc CreateRun(CreateWorkflowRunRequest) returns (WorkflowRunResponse);
  rpc GetRun(GetWorkflowRunRequest) returns (WorkflowRunResponse);
  rpc ListRuns(ListWorkflowRunsRequest) returns (ListWorkflowRunsResponse);
  rpc ResumeRun(ResumeWorkflowRunRequest) returns (WorkflowRunResponse);
  rpc CancelRun(CancelWorkflowRunRequest) returns (WorkflowRunResponse);
  rpc StreamEvents(StreamWorkflowEventsRequest) returns (stream talon.data.WorkflowRunEvent);
}

service KnowledgeService {
  rpc Get(GetKnowledgeRequest) returns (KnowledgeResponse);
  rpc Search(SearchKnowledgeRequest) returns (SearchKnowledgeResponse);
}

service AuthService {
  rpc GetSsoConfig(GetSsoConfigRequest) returns (GetSsoConfigResponse);
  rpc ExchangeOidcToken(ExchangeOidcTokenRequest) returns (ExchangeOidcTokenResponse);
}

message CreateResourceRequest {
  string ns = 1;
  talon.resources.ResourceManifest manifest = 2;
}

message GetResourceRequest {
  string ns = 1;
  string kind = 2;
  string name = 3;
}

message ListResourcesRequest {
  string ns = 1;
  optional string kind = 2;
}

message DeleteResourceRequest {
  string ns = 1;
  string kind = 2;
  string name = 3;
}

message ResourceResponse {
  talon.resources.Resource resource = 1;
}

message ListResourcesResponse {
  repeated talon.resources.Resource resources = 1;
}

message DeleteResourceResponse {
  bool success = 1;
}

message GetKnowledgeRequest {
  string agent = 1;
  string ns = 2;
  optional string path = 3;
}

message KnowledgeResponse {
  repeated talon.data.Knowledge modules = 1;
}

message SearchKnowledgeRequest {
  string agent = 1;
  string ns = 2;
  string query = 3;
}

message SearchKnowledgeResponse {
  repeated talon.data.KnowledgeSearchResult results = 1;
}

message CreateSessionRequest {
  string agent = 1;
  string ns = 2;
  map<string, string> labels = 3;
}

message GetSessionRequest {
  reserved 5;
  reserved "step_limit";

  string session_id = 1;
  string agent = 2;
  string ns = 3;
  int32 message_limit = 4;
}

message ListSessionMessagesRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
  int32 page_size = 4;
  optional string before_message_id = 5;
}

message ListSessionMessagesResponseItem {
  reserved 2;
  reserved "steps";

  talon.data.SessionMessage message = 1;
}

message ListSessionMessagesResponse {
  string session_id = 1;
  string agent = 2;
  string state = 3;
  repeated ListSessionMessagesResponseItem items = 4;
  bool has_more = 5;
  optional string next_before_message_id = 6;
}

message ListSessionsRequest {
  string agent = 1;
  string ns = 2;
}

message SessionListItem {
  string session_id = 1;
  int64 updated_at = 2;
  map<string, string> labels = 3;
}

message ListSessionsResponse {
  repeated string session_ids = 1;
  repeated SessionListItem sessions = 2;
}

message SessionResponse {
  reserved 5;
  reserved "steps";

  string session_id = 1;
  string agent = 2;
  string state = 3;
  repeated talon.data.SessionMessage messages = 4;
  map<string, string> labels = 6;
}

message DeleteSessionRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
}

message DeleteSessionResponse {
  bool success = 1;
}

message ClearSessionRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
}

message ClearSessionResponse {
  bool success = 1;
}

message SubmitSessionTurnRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
  talon.data.SessionMessage message = 4;
  map<string, string> labels = 5;
}

message SendMessageRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
  string message = 4;
  map<string, string> labels = 5;
}

message SendMessageResponse {
  string reply = 1;
  string session_id = 4;
}

message AppendSessionMessageRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
  talon.data.SessionMessage message = 4;
}

message AppendSessionMessageResponse {
  string session_id = 1;
  talon.data.SessionMessage message = 2;
}

message AnswerSessionPermissionRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
  string request_id = 4;
  string outcome = 5;
  string option_id = 6;
  string decided_by = 7;
}

message AnswerSessionPermissionResponse {
  string session_id = 1;
  string request_id = 2;
  string outcome = 3;
  string option_id = 4;
}

message StopSessionGenerationRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
}

message StopSessionGenerationResponse {
  bool success = 1;
}

message StreamSessionPartsRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
}

message StreamSessionPartsBatchRequest {
  repeated string session_names = 1;
}

message PostChannelMessageRequest {
  string ns = 1;
  string channel = 2;
  string author_kind = 3;
  string author = 4;
  string content = 5;
  repeated string subscription_names = 6;
  map<string, string> labels = 7;
}

message RoutedChannelSession {
  string subscription = 1;
  string agent = 2;
  string session_id = 3;
  string error = 4;
}

message PostChannelMessageResponse {
  talon.data.ChannelMessage message = 1;
  repeated RoutedChannelSession routed_sessions = 2;
}

message GetChannelMessageRequest {
  string ns = 1;
  string channel = 2;
  string message_id = 3;
}

message ChannelMessageResponse {
  talon.data.ChannelMessage message = 1;
}

message ListChannelMessagesRequest {
  string ns = 1;
  string channel = 2;
  int32 limit = 3;
  int32 page_size = 4;
  optional string before_message_id = 5;
}

message ListChannelMessagesResponse {
  repeated talon.data.ChannelMessage messages = 1;
  bool has_more = 2;
  optional string next_before_message_id = 3;
}

message StreamChannelEventsRequest {
  string ns = 1;
  string channel = 2;
}

message CreateWorkflowRunRequest {
  string ns = 1;
  string workflow = 2;
  string input_json = 3;
  map<string, string> labels = 4;
}

message GetWorkflowRunRequest {
  string ns = 1;
  string workflow = 2;
  string run_id = 3;
}

message ListWorkflowRunsRequest {
  string ns = 1;
  string workflow = 2;
  int32 page_size = 3;
  string before_run_id = 4;
}

message ResumeWorkflowRunRequest {
  string ns = 1;
  string workflow = 2;
  string run_id = 3;
  string step_id = 4;
  string resume_json = 5;
}

message CancelWorkflowRunRequest {
  string ns = 1;
  string workflow = 2;
  string run_id = 3;
}

message StreamWorkflowEventsRequest {
  string ns = 1;
  string workflow = 2;
  string run_id = 3;
}

message WorkflowRunResponse {
  talon.data.WorkflowRun run = 1;
  repeated talon.data.WorkflowStepRun steps = 2;
}

message ListWorkflowRunsResponse {
  repeated talon.data.WorkflowRun runs = 1;
  bool has_more = 2;
  string next_before_run_id = 3;
}

message CreateNamespaceRequest {
  string name = 1;
  bool recursive = 2;
  map<string, string> labels = 3;
}

message GetNamespaceRequest {
  string name = 1;
}

message DeleteNamespaceRequest {
  string name = 1;
}

message ListNamespacesRequest {
  optional string parent = 1;
}

message NamespaceResponse {
  string name = 1;
  optional string parent = 2;
  bool is_deleted = 3;
  int64 deleted_at = 4;
  map<string, string> labels = 5;
}

message ListNamespacesResponse {
  repeated NamespaceResponse namespaces = 1;
}

message GetSsoConfigRequest {}

message GetSsoConfigResponse {
  bool google_sso_enabled = 1;
  optional string google_web_client_id = 2;
}

message ExchangeOidcTokenRequest {
  string id_token = 1;
  optional string trust = 2;
  optional string client_type = 3;
}

message ExchangeOidcTokenResponse {
  string access_token = 1;
  string token_type = 2;
  uint64 expires_in = 3;
  string subject = 4;
  optional string email = 5;
  string trust = 6;
  optional string client_type = 7;
}
