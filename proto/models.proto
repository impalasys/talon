syntax = "proto3";

package talon.models;
import "proto/manifests.proto";

// ---------------------------------------------------------
// Persistent KeyValue Models
// Used as the schema source-of-truth for runtime storage.
// ---------------------------------------------------------

message Agent {
  string name = 1;
  string ns = 2;
  talon.manifests.AgentDefinition definition = 3;
  talon.manifests.AgentSpec effective_spec = 4;
  repeated string template_deps = 5;
  map<string, string> labels = 7;
}

enum MessageRole {
  ROLE_UNSPECIFIED = 0;
  ROLE_USER = 1;
  ROLE_ASSISTANT = 2;
  ROLE_SYSTEM = 3;
}

enum SessionMessagePartType {
  SESSION_MESSAGE_PART_TYPE_UNSPECIFIED = 0;
  SESSION_MESSAGE_PART_TYPE_TEXT = 1;
  SESSION_MESSAGE_PART_TYPE_REASONING = 2;
  SESSION_MESSAGE_PART_TYPE_TOOL_CALL = 3;
  SESSION_MESSAGE_PART_TYPE_TOOL_RESULT = 4;
  SESSION_MESSAGE_PART_TYPE_USAGE = 5;
  SESSION_MESSAGE_PART_TYPE_ERROR = 6;
  SESSION_MESSAGE_PART_TYPE_IMAGE = 7;
  SESSION_MESSAGE_PART_TYPE_AUDIO = 8;
  SESSION_MESSAGE_PART_TYPE_VIDEO = 9;
  SESSION_MESSAGE_PART_TYPE_FILE = 10;
}

message ObjectRef {
  string key = 1;
  string media_type = 2;
  uint64 size_bytes = 3;
  string sha256 = 4;
  string filename = 5;
  map<string, string> metadata = 6;
}

message SessionMessagePart {
  string id = 1;
  SessionMessagePartType part_type = 2;
  string content = 3;
  string name = 4;
  string payload_json = 5;
  // Unix timestamp in microseconds.
  int64 created_at = 6;
  ObjectRef object = 7;
}

message SessionMessage {
  string id = 1;
  MessageRole role = 2;
  reserved 3;
  // Unix timestamp in microseconds.
  int64 created_at = 4;
  map<string, string> labels = 5;
  repeated SessionMessagePart parts = 6;
}

message Session {
  string id = 1;
  string agent = 2;
  string ns = 3;
  string status = 4;
  // Unix timestamp in microseconds.
  int64 created_at = 5;
  // Unix timestamp in microseconds.
  int64 last_active = 6;
  map<string, string> metadata = 7;
  map<string, string> labels = 8;
}

message Channel {
  string name = 1;
  string ns = 2;
  string title = 3;
  string status = 4;
  // Unix timestamp in microseconds.
  int64 created_at = 5;
  // Unix timestamp in microseconds.
  int64 updated_at = 6;
  map<string, string> metadata = 7;
  map<string, string> labels = 8;
}

message ChannelMessage {
  string id = 1;
  string ns = 2;
  string channel = 3;
  string author_kind = 4;
  string author = 5;
  string content = 6;
  // Unix timestamp in microseconds.
  int64 created_at = 7;
  string source_agent = 8;
  string source_session_id = 9;
  map<string, string> labels = 10;
}

message ChannelContextPolicy {
  string mode = 1;
  uint32 max_messages = 2;
}

message ChannelSubscription {
  string name = 1;
  string ns = 2;
  string channel = 3;
  string agent = 4;
  bool enabled = 5;
  string trigger = 6;
  ChannelContextPolicy context_policy = 7;
  map<string, string> metadata = 8;
  map<string, string> labels = 9;
  // Reply behavior for routed sessions. Defaults to "tool"; "none" withholds channel reply tools.
  string reply_mode = 10;
}

message ScheduleTarget {
  string agent = 1;
  string session_mode = 2;
  string session_id = 3;
}

message ScheduleSpec {
  string kind = 1;
  string cron = 2;
  uint32 interval_seconds = 3;
  string run_at = 4;
  string timezone = 5;
  ScheduleTarget target = 6;
  string input_message = 7;
  bool enabled = 8;
}

message ScheduleStatus {
  uint64 revision = 1;
  optional int64 next_run_at = 2;
  optional string backend_handle = 3;
  bool backend_armed = 4;
  optional int64 last_run_at = 5;
  optional string last_session_id = 6;
  optional string last_error = 7;
  optional int64 claimed_run_at = 8;
  optional int64 claim_expires_at = 9;
  repeated ScheduleEvent recent_events = 10;
}

message ScheduleEvent {
  int64 timestamp = 1;
  string phase = 2;
  string outcome = 3;
  string detail = 4;
}

message Schedule {
  string name = 1;
  string ns = 2;
  ScheduleSpec spec = 3;
  ScheduleStatus status = 4;
  map<string, string> labels = 5;
}

message Namespace {
  string name = 1;
  string parent = 2; // e.g. "Sys", "default:subs"
  bool is_deleted = 3; // GC Tombstone
  int64 deleted_at = 4;
  map<string, string> labels = 5;
}

message Knowledge {
  string path = 1; // e.g. "goals.md"
  string content = 2;
  int64 updated_at = 3;
  string namespace = 4;
  string name = 5;
}

message KnowledgeSearchResult {
  string path = 1;
  string snippet = 2;
  float score = 3;
  int64 timestamp = 4;
  string namespace = 5;
}
