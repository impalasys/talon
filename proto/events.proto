syntax = "proto3";

package talon.events;

import "proto/data/data.proto";

enum SystemAction {
    SYSTEM_ACTION_UNSPECIFIED = 0;
    SYSTEM_ACTION_CREATE = 1;
    SYSTEM_ACTION_UPDATE = 2;
    SYSTEM_ACTION_DELETE = 3;
    SYSTEM_ACTION_SUSPEND = 4;
    SYSTEM_ACTION_RESUME = 5;
}

message LifecycleEvent {
    string resource_type = 1;
    string name = 2;
    string ns = 3;
    SystemAction action = 4;
    int64 timestamp = 5;
}

enum MessageDirection {
    MESSAGE_DIRECTION_UNSPECIFIED = 0;
    MESSAGE_DIRECTION_INBOUND = 1;
    MESSAGE_DIRECTION_OUTBOUND = 2;
}

message SessionMessageEvent {
    string session_id = 1;
    string message_id = 2;
    MessageDirection direction = 3;
    int64 timestamp = 4;
    string agent = 5;
    string message = 6;
    string ns = 7;
    string submission_id = 8;
}

message SessionControlEvent {
    string session_id = 1;
    string agent = 2;
    string ns = 3;
    string action = 4;
    int64 timestamp = 5;
}

enum SessionMessagePartEventKind {
    SESSION_MESSAGE_PART_EVENT_KIND_UNSPECIFIED = 0;
    SESSION_MESSAGE_PART_EVENT_KIND_DELTA = 1;
    SESSION_MESSAGE_PART_EVENT_KIND_DONE = 2;
    SESSION_MESSAGE_PART_EVENT_KIND_ERROR = 3;
}

message SessionMessagePartEvent {
    string session_id = 1;
    SessionMessagePartEventKind kind = 2;
    talon.data.SessionMessagePart part = 3;
    int64 timestamp = 4;
    string agent = 5;
    string ns = 6;
    string message_id = 7;
}

enum ChannelEventKind {
    CHANNEL_EVENT_KIND_UNSPECIFIED = 0;
    CHANNEL_EVENT_KIND_MESSAGE_CREATED = 1;
    CHANNEL_EVENT_KIND_SESSION_ROUTED = 2;
    CHANNEL_EVENT_KIND_PUBLISH_SKIPPED = 3;
    CHANNEL_EVENT_KIND_ERROR = 4;
}

message ChannelEvent {
    string ns = 1;
    string channel = 2;
    ChannelEventKind kind = 3;
    talon.data.ChannelMessage message = 4;
    string session_id = 5;
    string agent = 6;
    string subscription = 7;
    string error = 8;
    int64 timestamp = 9;
}

message WorkflowDispatchEvent {
    string ns = 1;
    string workflow = 2;
    string run_id = 3;
    string reason = 4;
    string step_id = 5;
    string child_session_id = 6;
    int64 timestamp = 7;
}

enum ResourceChangeType {
    RESOURCE_CHANGE_TYPE_UNSPECIFIED = 0;
    RESOURCE_CHANGE_TYPE_CREATED = 1;
    RESOURCE_CHANGE_TYPE_UPDATED = 2;
    RESOURCE_CHANGE_TYPE_DELETED = 3;
}

message ResourceChangedEvent {
    string namespace = 1;
    string resource_kind = 2;
    string name = 3;
    string uid = 4;
    string resource_version = 5;
    uint64 generation = 6;
    ResourceChangeType change_type = 7;
    repeated string changed_sections = 8;
    int64 timestamp = 9;
}

enum IndexOperation {
    INDEX_OPERATION_UNSPECIFIED = 0;
    INDEX_OPERATION_UPSERT = 1;
    INDEX_OPERATION_DELETE = 2;
}

message IndexEvent {
    string id = 1;
    IndexOperation operation = 2;
    int64 created_at = 3;
    int64 updated_at = 4;

    oneof target {
        IndexResourceTarget resource = 10;
        IndexSessionMessageTarget session_message = 11;
        IndexSessionTarget session = 12;
    }
}

message IndexResourceTarget {
    string resource_key = 1;
    uint64 source_generation = 2;
}

message IndexSessionMessageTarget {
    string namespace = 1;
    string agent = 2;
    string session_id = 3;
    string message_id = 4;
    uint64 source_generation = 5;
}

message IndexSessionTarget {
    string namespace = 1;
    string agent = 2;
    string session_id = 3;
}
