syntax = "proto3";

package talon.resources;

import "proto/resources/common.proto";

message File {
  ResourceMeta metadata = 1;
  FileSpec spec = 2;
  FileStatus status = 3;
}

message FileSpec {
  string path = 1;
  string media_type = 2;
  FilePurpose purpose = 3;
  FileIndexPolicy index_policy = 4;
  FileRetention retention = 5;
}

enum FilePurpose {
  FILE_PURPOSE_UNSPECIFIED = 0;
  FILE_PURPOSE_MEMORY = 1;
  FILE_PURPOSE_ARTIFACT = 2;
}

enum FileIndexPolicy {
  FILE_INDEX_POLICY_UNSPECIFIED = 0;
  FILE_INDEX_POLICY_NONE = 1;
  FILE_INDEX_POLICY_SEARCH = 2;
  FILE_INDEX_POLICY_RETRIEVAL = 3;
}

enum FileRetention {
  FILE_RETENTION_UNSPECIFIED = 0;
  FILE_RETENTION_RETAINED = 1;
}

message FileStatus {
  uint64 observed_generation = 1;
  string phase = 2;
  repeated ResourceCondition conditions = 3;
  FileObjectRef object_ref = 4;
  int64 updated_at = 5;
}

message FileObjectRef {
  string key = 1;
  string media_type = 2;
  uint64 size_bytes = 3;
  string sha256 = 4;
  string filename = 5;
  map<string, string> metadata = 6;
}
