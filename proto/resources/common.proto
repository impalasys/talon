syntax = "proto3";

package talon.resources;

message OwnerReference {
  string api_version = 1;
  string kind = 2;
  string namespace = 3;
  string name = 4;
  string uid = 5;
  bool controller = 6;
  bool block_owner_deletion = 7;
}

message ResourceMeta {
  string name = 1;
  string namespace = 2;
  map<string, string> labels = 3;
  map<string, string> annotations = 4;
  repeated OwnerReference owner_references = 5;
  repeated string finalizers = 6;
  uint64 generation = 7;
  string resource_version = 8;
  string uid = 9;
  optional int64 deletion_timestamp = 10;
}

message ResourceCondition {
  string type = 1;
  string status = 2;
  string reason = 3;
  string message = 4;
  // Unix timestamp in microseconds.
  int64 last_transition_time = 5;
  uint64 observed_generation = 6;
}

message CommonResourceStatus {
  uint64 observed_generation = 1;
  string phase = 2;
  repeated ResourceCondition conditions = 3;
}

message ResourceRef {
  string namespace = 1;
  string name = 2;
}

message NamespaceSelector {
  string parent = 1;
  map<string, string> match_labels = 2;
}
