syntax = "proto3";

package talon.resources;

import "proto/resources/common.proto";
import "proto/resources/files.proto";

message Task {
  ResourceMeta metadata = 1;
  TaskSpec spec = 2;
  TaskStatus status = 3;
}

message TaskSpec {
  string title = 1;
  string description = 2;
  // Optional caller-defined classifier for grouping or UI display.
  //
  // Talon does not interpret this field for scheduling, routing, auth, or task
  // lifecycle. Use values such as "agent_delegation", "human_review", or an
  // application-specific string when the caller needs a stable category.
  string type = 3;
  // Agent resource that created and owns follow-up responsibility for the task.
  ResourceRef owner = 4;
  // Agent resource intended to perform the work.
  ResourceRef delegate = 5;
}

// Runtime location of the work that is fulfilling the task. This may be absent
// while queued and filled in after async delegation starts.
message TaskExecutionRef {
  string kind = 1;
  string namespace = 2;
  string name = 3;
  string session_id = 4;
  string run_id = 5;
}

// Lifecycle phase for a Task.
enum TaskPhase {
  // No phase has been set. Writers should avoid persisting this outside
  // partially initialized records.
  TASK_PHASE_UNSPECIFIED = 0;
  // The task exists but no delegate execution has started.
  TASK_PHASE_QUEUED = 1;
  // The delegate is actively working on the task.
  TASK_PHASE_RUNNING = 2;
  // Progress is blocked on user input, permissions, dependencies, or another
  // external condition.
  TASK_PHASE_BLOCKED = 3;
  // Work is complete enough for the owner or another reviewer to inspect.
  TASK_PHASE_NEEDS_REVIEW = 4;
  // The task completed successfully.
  TASK_PHASE_SUCCEEDED = 5;
  // The task ended because execution failed.
  TASK_PHASE_FAILED = 6;
  // The task was intentionally stopped before completion.
  TASK_PHASE_CANCELED = 7;
  // The task exceeded its allowed lifetime or retention policy.
  TASK_PHASE_EXPIRED = 8;
}

message TaskStatus {
  uint64 observed_generation = 1;
  TaskPhase phase = 2;
  repeated ResourceCondition conditions = 3;
  string progress_summary = 4;
  repeated FileObjectRef result_artifacts = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
  int64 completed_at = 8;
  int64 expires_at = 9;
  // Concrete runtime execution once a delegate session or run is known.
  TaskExecutionRef execution_ref = 10;
  // Artifact URI outputs explicitly attached by the task executor.
  repeated string output_artifact_uris = 11;
}
