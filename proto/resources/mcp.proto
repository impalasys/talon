syntax = "proto3";

package talon.resources;

import "proto/resources/common.proto";

message McpServer {
  ResourceMeta metadata = 1;
  McpServerSpec spec = 2;
  CommonResourceStatus status = 3;
}

message McpServerSpec {
  string transport = 1;
  string target = 2;
  repeated string args = 3;
  map<string, string> headers = 4;
  bool disabled = 5;
  McpAuthBrokerSpec auth_broker = 6;
  McpServerPolicy policy = 7;
}

message McpAuthBrokerSpec {
  string kind = 1;
  string url = 2;
  int32 cache_ttl_seconds = 3;
  string audience = 4;
}

message McpServerPolicy {
  McpToolPolicy tools = 1;
}

message McpToolPolicy {
  repeated string allowlist = 1;
}
