syntax = "proto3";

package talon.resources;

import "proto/resources/common.proto";

message McpServer {
  ResourceMeta metadata = 1;
  McpServerSpec spec = 2;
  CommonResourceStatus status = 3;
}

message McpServerSpec {
  string transport = 1;
  string target = 2;
  repeated string args = 3;
  map<string, string> headers = 4;
  bool disabled = 5;
}

message McpServerBinding {
  ResourceMeta metadata = 1;
  McpServerBindingSpec spec = 2;
  CommonResourceStatus status = 3;
}

message McpServerBindingSpec {
  string server_ref = 1;
  repeated string args = 2;
  map<string, string> headers = 3;
  bool disabled = 4;
  McpAuthBrokerSpec auth_broker = 5;
  repeated string allowed_tool_names = 6;
}

message McpAuthBrokerSpec {
  string kind = 1;
  string url = 2;
  int32 cache_ttl_seconds = 3;
  string audience = 4;
}
