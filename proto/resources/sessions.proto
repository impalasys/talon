syntax = "proto3";

package talon.resources;

import "proto/resources/common.proto";

message SessionSpec {
  string agent = 1;
  map<string, string> labels = 2;
}

message SessionStatus {
  uint64 observed_generation = 1;
  string phase = 2;
  repeated ResourceCondition conditions = 3;
  int64 created_at = 4;
  int64 last_active = 5;
  string acp_session_id = 6;
  // Sandbox resource name in the same namespace as this Session.
  string sandbox_ref = 7;
}

message PermissionRequestSpec {
  string agent = 1;
  string session_id = 2;
  string action = 3;
  string prompt = 4;
  string payload_json = 5;
}

message PermissionRequestStatus {
  uint64 observed_generation = 1;
  string phase = 2;
  repeated ResourceCondition conditions = 3;
  string decision = 4;
  string decided_by = 5;
  int64 decided_at = 6;
}
