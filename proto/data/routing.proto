syntax = "proto3";

package talon.data;

message ResourceRef {
  // Namespace containing the referenced Talon resource. Empty means the
  // reference is resolved relative to the owning resource or route.
  string namespace = 1;

  // Resource name within namespace.
  string name = 2;
}

message SessionMessageConsumer {
  // Agent that consumes matching messages through a Talon Session.
  ResourceRef agent = 1;

  // Existing Talon Session id to deliver matching messages into. The session
  // is resolved under agent.namespace/name, with an empty agent namespace
  // resolved relative to the owning Connector namespace.
  string session_id = 2;

  // Session continuity policy. "reuse" reuses the connector session pointer
  // for the external conversation/thread; "pinned" requires session_id; any
  // other value creates a new Session for each message.
  string continuity = 3;
}

message ChannelMessageConsumer {
  // Channel that receives matching messages before agent routing.
  ResourceRef channel = 1;

  // Agent that consumes the persisted Channel message.
  ResourceRef agent = 2;

  // Channel routing continuity policy. This is reserved for channel dispatch
  // policies that create agent runtime context per message or thread.
  string continuity = 3;

  // Reply behavior requested from the connector-aware channel router, such as
  // replying in the provider thread instead of the root conversation.
  string reply_policy = 4;
}

message WorkflowMessageConsumer {
  // Workflow that consumes matching messages.
  ResourceRef workflow = 1;

  // Reply behavior requested from the workflow completion router, such as
  // replying in the provider thread instead of the root conversation.
  string reply_mode = 2;
}

message MessageConsumer {
  // Session consumer payload. Mutually exclusive with channel and workflow.
  optional SessionMessageConsumer session = 1;

  // Channel consumer payload. Mutually exclusive with session and workflow.
  optional ChannelMessageConsumer channel = 2;

  // Workflow consumer payload. Mutually exclusive with session and channel.
  optional WorkflowMessageConsumer workflow = 3;
}
