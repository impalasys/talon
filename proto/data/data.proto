syntax = "proto3";

package talon.data;

enum MessageRole {
  ROLE_UNSPECIFIED = 0;
  ROLE_USER = 1;
  ROLE_ASSISTANT = 2;
  ROLE_SYSTEM = 3;
}

enum SessionMessagePartType {
  SESSION_MESSAGE_PART_TYPE_UNSPECIFIED = 0;
  SESSION_MESSAGE_PART_TYPE_TEXT = 1;
  SESSION_MESSAGE_PART_TYPE_REASONING = 2;
  SESSION_MESSAGE_PART_TYPE_TOOL_CALL = 3;
  SESSION_MESSAGE_PART_TYPE_TOOL_RESULT = 4;
  SESSION_MESSAGE_PART_TYPE_USAGE = 5;
  SESSION_MESSAGE_PART_TYPE_ERROR = 6;
  SESSION_MESSAGE_PART_TYPE_IMAGE = 7;
  SESSION_MESSAGE_PART_TYPE_AUDIO = 8;
  SESSION_MESSAGE_PART_TYPE_VIDEO = 9;
  SESSION_MESSAGE_PART_TYPE_FILE = 10;
  SESSION_MESSAGE_PART_TYPE_REQUEST_PERMISSION = 11;
  SESSION_MESSAGE_PART_TYPE_PERMISSION_RESULT = 12;
}

message ObjectRef {
  string key = 1;
  string media_type = 2;
  uint64 size_bytes = 3;
  string sha256 = 4;
  string filename = 5;
  map<string, string> metadata = 6;
  string content_encoding = 7;
}

// Session-scoped immutable output produced by an agent.
//
// Artifacts are not namespace-level File resources. They live under the
// owning session/run, are exchanged through HandleGrant records, and are not
// indexed directly. Promoting an Artifact to a durable File copies its bytes
// into File-owned CAS storage and creates or updates a File resource.
message Artifact {
  // Stable artifact id unique within the namespace/session artifact store.
  string id = 1;
  // Session that owns the artifact lifecycle and cleanup policy.
  string session_id = 2;
  // Human-readable label suitable for UI display.
  string title = 3;
  // Session-local logical path, such as /outputs/final-draft.md.
  string path = 4;
  // Media type of the artifact content, for example text/markdown.
  string media_type = 5;
  // Authoritative CAS/object reference for immutable artifact bytes.
  ObjectRef object_ref = 6;
  // Agent name that created the artifact.
  string created_by_agent = 7;
  // Unix timestamp in microseconds when the artifact record was created.
  int64 created_at = 8;
  // Query/display labels copied from the creating tool or runtime.
  map<string, string> labels = 9;
  // Non-indexed, caller-defined metadata about the artifact.
  map<string, string> metadata = 10;
}

enum GoalPhase {
  GOAL_PHASE_UNSPECIFIED = 0;
  GOAL_PHASE_RUNNING = 1;
  GOAL_PHASE_PAUSED = 2;
  GOAL_PHASE_NEEDS_REVIEW = 3;
  GOAL_PHASE_SUCCEEDED = 4;
  GOAL_PHASE_FAILED = 5;
  GOAL_PHASE_BLOCKED = 6;
  GOAL_PHASE_CANCELED = 7;
  GOAL_PHASE_EXPIRED = 8;
}

message GoalEvidenceRef {
  string kind = 1;
  string namespace = 2;
  string name = 3;
  string agent = 4;
  string session_id = 5;
  string handle = 6;
  string object_key = 7;
  string summary = 8;
}

message Goal {
  string id = 1;
  string namespace = 2;
  string agent = 3;
  string session_id = 4;
  string objective = 5;
  repeated string success_criteria = 6;
  GoalPhase phase = 7;
  string progress_summary = 8;
  int32 iteration = 9;
  int32 max_iterations = 10;
  repeated GoalEvidenceRef evidence_refs = 11;
  int64 created_at = 12;
  int64 updated_at = 13;
  int64 completed_at = 14;
  string blocked_reason = 15;
  map<string, string> labels = 16;
  map<string, string> metadata = 17;
}

message GoalIndexEntry {
  string namespace = 1;
  string agent = 2;
  string session_id = 3;
  string goal_id = 4;
  GoalPhase phase = 5;
  string status_group = 6;
  int64 updated_at = 7;
}

// Opaque access grant for a File or Artifact handle.
//
// Handle strings include an encoded target locator plus this grant id. File
// grants are stored under the target File; Artifact grants are stored under the
// target Artifact. Callers must present a valid handle and match the recorded
// audience before FileService or ArtifactService allows the requested operation.
message HandleGrant {
  // Opaque grant id encoded into the external handle string.
  string id = 1;
  // Namespace containing the target resource or session child record.
  string namespace = 2;
  // Target kind, currently ARTIFACT or FILE.
  string kind = 3;
  // Target id, such as an artifact id or File resource name.
  string target_id = 4;
  // Agent that minted the grant.
  string agent = 5;
  // Session that minted the grant, when the grant is session scoped.
  string session_id = 6;
  // Allowed operations, such as read, metadata, promote, or write.
  repeated string operations = 7;
  // Optional agent audience. Empty means any authorized agent may use it.
  string audience_agent = 8;
  // Optional session audience. Empty means any authorized session may use it.
  string audience_session_id = 9;
  // Unix timestamp in microseconds when the grant expires. Zero means unset.
  int64 expires_at = 10;
  // Unix timestamp in microseconds when the grant was created.
  int64 created_at = 11;
}

message Principal {
  // Stable provider-native principal identifier when available, such as a
  // Slack user ID or iMessage handle GUID.
  string external_id = 1;

  // Human-addressable identity when available, such as email, phone number, or
  // iMessage handle.
  string address = 2;

  // Display name captured from the provider at event time.
  string display_name = 3;

  // Normalized principal kind, such as user, bot, app, or system.
  string kind = 4;

  // Provider-specific identity metadata that does not justify a first-class
  // protocol field.
  map<string, string> metadata = 5;
}

message SessionMessagePart {
  string id = 1;
  SessionMessagePartType part_type = 2;
  string content = 3;
  string name = 4;
  string payload_json = 5;
  // Unix timestamp in microseconds.
  int64 created_at = 6;
  ObjectRef object = 7;
}

message SessionMessage {
  string id = 1;
  MessageRole role = 2;
  reserved 3;
  // Unix timestamp in microseconds.
  int64 created_at = 4;
  map<string, string> labels = 5;
  repeated SessionMessagePart parts = 6;
}

message Session {
  string id = 1;
  string agent = 2;
  string ns = 3;
  string status = 4;
  // Unix timestamp in microseconds.
  int64 created_at = 5;
  // Unix timestamp in microseconds.
  int64 last_active = 6;
  map<string, string> metadata = 7;
  map<string, string> labels = 8;
}

message ChannelMessage {
  string id = 1;
  string ns = 2;
  string channel = 3;
  string author_kind = 4;
  string author = 5;
  string content = 6;
  // Unix timestamp in microseconds.
  int64 created_at = 7;
  string source_agent = 8;
  string source_session_id = 9;
  map<string, string> labels = 10;
}

message Knowledge {
  string path = 1;
  string content = 2;
  // Unix timestamp in microseconds.
  int64 updated_at = 3;
  string namespace = 4;
  string name = 5;
}

message KnowledgeSearchResult {
  string path = 1;
  string snippet = 2;
  float score = 3;
  // Unix timestamp in microseconds.
  int64 timestamp = 4;
  string namespace = 5;
}

message WorkflowRun {
  string id = 1;
  string workflow = 2;
  string ns = 3;
  string status = 4;
  string input_json = 5;
  string state_json = 6;
  string output_json = 7;
  // Unix timestamp in microseconds.
  int64 created_at = 8;
  // Unix timestamp in microseconds.
  int64 updated_at = 9;
  map<string, string> labels = 10;
  // Unix timestamp in microseconds.
  optional int64 claim_expires_at = 11;
  string error = 12;
  string spec_json = 13;
  uint64 workflow_revision = 14;
  string claim_owner = 15;
  uint32 claim_attempt = 16;
  string last_dispatch_reason = 17;
}

message WorkflowStepRun {
  string id = 1;
  string step_id = 2;
  uint32 attempt = 3;
  string status = 4;
  string input_json = 5;
  string output_json = 6;
  string error = 7;
  string child_session_id = 8;
  string child_workflow_run_id = 9;
  string resume_json = 10;
  string suspend_json = 11;
  // Unix timestamp in microseconds.
  int64 created_at = 12;
  // Unix timestamp in microseconds.
  int64 updated_at = 13;
  // Unix timestamp in microseconds.
  optional int64 next_retry_at = 14;
  // Unix timestamp in microseconds.
  optional int64 timeout_at = 15;
  string wait_wakeup_handle = 16;
  // Unix timestamp in microseconds.
  optional int64 wait_until_at = 17;
}

message WorkflowRunEvent {
  string id = 1;
  string ns = 2;
  string workflow = 3;
  string run_id = 4;
  string type = 5;
  string step_id = 6;
  string message = 7;
  string payload_json = 8;
  int64 timestamp = 9;
}
