syntax = "proto3";

package talon.gateway;

import "google/api/annotations.proto";
import "proto/manifests.proto";
import "proto/models.proto";
import "proto/events.proto";

service GatewayService {
  // Agent Lifecycle
  rpc CreateAgent(CreateAgentRequest) returns (AgentResponse) {
    option (google.api.http) = {
      post: "/v1/ns/{ns}/agents"
      body: "*"
    };
  }

  rpc GetAgent(GetAgentRequest) returns (GetAgentResponse) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/agents/{name}"
    };
  }

  rpc ModifyAgent(ModifyAgentRequest) returns (AgentResponse) {
    option (google.api.http) = {
      put: "/v1/ns/{ns}/agents/{agent}"
      body: "*"
    };
  }
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/agents"
    };
  }

  // Agent Knowledge
  rpc GetKnowledge(GetKnowledgeRequest) returns (KnowledgeResponse) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/agents/{agent}/knowledge"
    };
  }
  rpc SearchKnowledge(SearchKnowledgeRequest) returns (SearchKnowledgeResponse) {
    option (google.api.http) = {
      post: "/v1/ns/{ns}/agents/{agent}/knowledge/search"
      body: "*"
    };
  }
  rpc CreateNamespaceKnowledge(CreateNamespaceKnowledgeRequest) returns (NamespaceKnowledgeResponse) {
    option (google.api.http) = {
      post: "/v1/namespaces/{ns}/knowledge"
      body: "*"
    };
  }
  rpc GetNamespaceKnowledge(GetNamespaceKnowledgeRequest) returns (NamespaceKnowledgeResponse) {
    option (google.api.http) = {
      get: "/v1/namespaces/{ns}/knowledge/{name}"
    };
  }
  rpc ListNamespaceKnowledge(ListNamespaceKnowledgeRequest) returns (ListNamespaceKnowledgeResponse) {
    option (google.api.http) = {
      get: "/v1/namespaces/{ns}/knowledge"
    };
  }
  rpc DeleteNamespaceKnowledge(DeleteNamespaceKnowledgeRequest) returns (DeleteNamespaceKnowledgeResponse) {
    option (google.api.http) = {
      delete: "/v1/namespaces/{ns}/knowledge/{name}"
    };
  }

  // Agent Sessions
  rpc CreateSession(CreateSessionRequest) returns (SessionResponse) {
    option (google.api.http) = {
      post: "/v1/ns/{ns}/agents/{agent}/sessions"
      body: "*"
    };
  }

  rpc GetSession(GetSessionRequest) returns (SessionResponse) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/agents/{agent}/sessions/{session_id}"
    };
  }
  rpc ListSessionMessages(ListSessionMessagesRequest) returns (ListSessionMessagesResponse) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/agents/{agent}/sessions/{session_id}/messages"
    };
  }
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/agents/{agent}/sessions"
    };
  }
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse) {
    option (google.api.http) = {
      delete: "/v1/ns/{ns}/agents/{agent}/sessions/{session_id}"
    };
  }

  rpc ClearSession(ClearSessionRequest) returns (ClearSessionResponse) {
    option (google.api.http) = {
      post: "/v1/ns/{ns}/agents/{agent}/sessions/{session_id}:clear"
      body: "*"
    };
  }

  // Interactive Comm
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse) {
    option (google.api.http) = {
      post: "/v1/ns/{ns}/agents/{agent}/sessions/{session_id}/message"
      body: "*"
    };
  }

  rpc AppendSessionMessage(AppendSessionMessageRequest) returns (AppendSessionMessageResponse) {
    option (google.api.http) = {
      post: "/v1/ns/{ns}/agents/{agent}/sessions/{session_id}/messages:append"
      body: "*"
    };
  }

  rpc StopSessionGeneration(StopSessionGenerationRequest) returns (StopSessionGenerationResponse) {
    option (google.api.http) = {
      post: "/v1/ns/{ns}/agents/{agent}/sessions/{session_id}:stop"
      body: "*"
    };
  }

  rpc StreamSessionParts(StreamSessionPartsRequest) returns (stream talon.events.SessionMessagePartEvent) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/agents/{agent}/sessions/{session_id}/stream"
    };
  }

  rpc StreamSessionPartsBatch(StreamSessionPartsBatchRequest) returns (stream talon.events.SessionMessagePartEvent) {
    option (google.api.http) = {
      post: "/v1/session-streams:batch"
      body: "*"
    };
  }

  // Channels
  rpc CreateChannel(CreateChannelRequest) returns (ChannelResponse) {
    option (google.api.http) = {
      post: "/v1/ns/{ns}/channels"
      body: "*"
    };
  }
  rpc GetChannel(GetChannelRequest) returns (ChannelResponse) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/channels/{name}"
    };
  }
  rpc ModifyChannel(ModifyChannelRequest) returns (ChannelResponse) {
    option (google.api.http) = {
      put: "/v1/ns/{ns}/channels/{name}"
      body: "*"
    };
  }
  rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/channels"
    };
  }
  rpc DeleteChannel(DeleteChannelRequest) returns (DeleteChannelResponse) {
    option (google.api.http) = {
      delete: "/v1/ns/{ns}/channels/{name}"
    };
  }
  rpc PostChannelMessage(PostChannelMessageRequest) returns (PostChannelMessageResponse) {
    option (google.api.http) = {
      post: "/v1/ns/{ns}/channels/{channel}/messages"
      body: "*"
    };
  }
  rpc GetChannelMessage(GetChannelMessageRequest) returns (ChannelMessageResponse) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/channels/{channel}/messages/{message_id}"
    };
  }
  rpc ListChannelMessages(ListChannelMessagesRequest) returns (ListChannelMessagesResponse) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/channels/{channel}/messages"
    };
  }
  rpc CreateChannelSubscription(CreateChannelSubscriptionRequest) returns (ChannelSubscriptionResponse) {
    option (google.api.http) = {
      post: "/v1/ns/{ns}/channels/{channel}/subscriptions"
      body: "*"
    };
  }
  rpc GetChannelSubscription(GetChannelSubscriptionRequest) returns (ChannelSubscriptionResponse) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/channels/{channel}/subscriptions/{name}"
    };
  }
  rpc ModifyChannelSubscription(ModifyChannelSubscriptionRequest) returns (ChannelSubscriptionResponse) {
    option (google.api.http) = {
      put: "/v1/ns/{ns}/channels/{channel}/subscriptions/{name}"
      body: "*"
    };
  }
  rpc ListChannelSubscriptions(ListChannelSubscriptionsRequest) returns (ListChannelSubscriptionsResponse) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/channels/{channel}/subscriptions"
    };
  }
  rpc DeleteChannelSubscription(DeleteChannelSubscriptionRequest) returns (DeleteChannelSubscriptionResponse) {
    option (google.api.http) = {
      delete: "/v1/ns/{ns}/channels/{channel}/subscriptions/{name}"
    };
  }
  rpc StreamChannelEvents(StreamChannelEventsRequest) returns (stream talon.events.ChannelEvent) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/channels/{channel}/stream"
    };
  }

  // Schedules
  rpc CreateSchedule(CreateScheduleRequest) returns (ScheduleResponse) {
    option (google.api.http) = {
      post: "/v1/ns/{ns}/schedules"
      body: "*"
    };
  }
  rpc GetSchedule(GetScheduleRequest) returns (ScheduleResponse) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/schedules/{name}"
    };
  }
  rpc ModifySchedule(ModifyScheduleRequest) returns (ScheduleResponse) {
    option (google.api.http) = {
      put: "/v1/ns/{ns}/schedules/{name}"
      body: "*"
    };
  }
  rpc ListSchedules(ListSchedulesRequest) returns (ListSchedulesResponse) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/schedules"
    };
  }
  rpc DeleteSchedule(DeleteScheduleRequest) returns (DeleteScheduleResponse) {
    option (google.api.http) = {
      delete: "/v1/ns/{ns}/schedules/{name}"
    };
  }

  // Workflows
  rpc CreateWorkflow(CreateWorkflowRequest) returns (WorkflowResponse) {
    option (google.api.http) = {
      post: "/v1/ns/{ns}/workflows"
      body: "*"
    };
  }
  rpc GetWorkflow(GetWorkflowRequest) returns (WorkflowResponse) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/workflows/{name}"
    };
  }
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/workflows"
    };
  }
  rpc DeleteWorkflow(DeleteWorkflowRequest) returns (DeleteWorkflowResponse) {
    option (google.api.http) = {
      delete: "/v1/ns/{ns}/workflows/{name}"
    };
  }
  rpc CreateWorkflowRun(CreateWorkflowRunRequest) returns (WorkflowRunResponse) {
    option (google.api.http) = {
      post: "/v1/ns/{ns}/workflows/{workflow}/runs"
      body: "*"
    };
  }
  rpc GetWorkflowRun(GetWorkflowRunRequest) returns (WorkflowRunResponse) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/workflows/{workflow}/runs/{run_id}"
    };
  }
  rpc ListWorkflowRuns(ListWorkflowRunsRequest) returns (ListWorkflowRunsResponse) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/workflows/{workflow}/runs"
    };
  }
  rpc ResumeWorkflowRun(ResumeWorkflowRunRequest) returns (WorkflowRunResponse) {
    option (google.api.http) = {
      post: "/v1/ns/{ns}/workflows/{workflow}/runs/{run_id}:resume"
      body: "*"
    };
  }
  rpc CancelWorkflowRun(CancelWorkflowRunRequest) returns (WorkflowRunResponse) {
    option (google.api.http) = {
      post: "/v1/ns/{ns}/workflows/{workflow}/runs/{run_id}:cancel"
      body: "*"
    };
  }
  rpc StreamWorkflowEvents(StreamWorkflowEventsRequest) returns (stream talon.models.WorkflowRunEvent) {
    option (google.api.http) = {
      get: "/v1/ns/{ns}/workflows/{workflow}/runs/{run_id}/stream"
    };
  }

  // Namespaces
  rpc CreateNamespace(CreateNamespaceRequest) returns (NamespaceResponse) {
    option (google.api.http) = {
      post: "/v1/namespaces/{name}"
      body: "*"
    };
  }
  rpc GetNamespace(GetNamespaceRequest) returns (NamespaceResponse) {
    option (google.api.http) = {
      get: "/v1/namespaces/{name}"
    };
  }
  rpc DeleteNamespace(DeleteNamespaceRequest) returns (NamespaceResponse) {
    option (google.api.http) = {
      delete: "/v1/namespaces/{name}"
    };
  }
  rpc ListNamespaces(ListNamespacesRequest) returns (ListNamespacesResponse) {
    option (google.api.http) = {
      get: "/v1/namespaces"
    };
  }

  // Agent Templates
  rpc CreateAgentTemplate(CreateAgentTemplateRequest) returns (AgentTemplateResponse) {
    option (google.api.http) = {
      post: "/v1/templates"
      body: "*"
    };
  }
  rpc GetAgentTemplate(GetAgentTemplateRequest) returns (AgentTemplateResponse) {
    option (google.api.http) = {
      get: "/v1/templates/{name}"
    };
  }
  rpc ListAgentTemplates(ListAgentTemplatesRequest) returns (ListAgentTemplatesResponse) {
    option (google.api.http) = {
      get: "/v1/templates"
    };
  }
  rpc DeleteAgentTemplate(DeleteAgentTemplateRequest) returns (DeleteAgentTemplateResponse) {
    option (google.api.http) = {
      delete: "/v1/templates/{name}"
    };
  }

  // MCP Servers
  rpc CreateMcpServer(CreateMcpServerRequest) returns (McpServerResponse) {
    option (google.api.http) = {
      post: "/v1/mcp-servers"
      body: "*"
    };
  }
  rpc GetMcpServer(GetMcpServerRequest) returns (McpServerResponse) {
    option (google.api.http) = {
      get: "/v1/mcp-servers/{name}"
    };
  }
  rpc ListMcpServers(ListMcpServersRequest) returns (ListMcpServersResponse) {
    option (google.api.http) = {
      get: "/v1/mcp-servers"
    };
  }
  rpc DeleteMcpServer(DeleteMcpServerRequest) returns (DeleteMcpServerResponse) {
    option (google.api.http) = {
      delete: "/v1/mcp-servers/{name}"
    };
  }

  rpc CreateMcpServerBinding(CreateMcpServerBindingRequest) returns (McpServerBindingResponse) {
    option (google.api.http) = {
      post: "/v1/namespaces/{ns}/mcp-bindings"
      body: "*"
    };
  }
  rpc GetMcpServerBinding(GetMcpServerBindingRequest) returns (McpServerBindingResponse) {
    option (google.api.http) = {
      get: "/v1/namespaces/{ns}/mcp-bindings/{name}"
    };
  }
  rpc ListMcpServerBindings(ListMcpServerBindingsRequest) returns (ListMcpServerBindingsResponse) {
    option (google.api.http) = {
      get: "/v1/namespaces/{ns}/mcp-bindings"
    };
  }
  rpc DeleteMcpServerBinding(DeleteMcpServerBindingRequest) returns (DeleteMcpServerBindingResponse) {
    option (google.api.http) = {
      delete: "/v1/namespaces/{ns}/mcp-bindings/{name}"
    };
  }

  // A2A Agent Cards
  rpc CreateAgentCard(CreateAgentCardRequest) returns (AgentCardResponse) {
    option (google.api.http) = {
      post: "/v1/namespaces/{ns}/agent-cards"
      body: "*"
    };
  }
  rpc GetAgentCard(GetAgentCardRequest) returns (AgentCardResponse) {
    option (google.api.http) = {
      get: "/v1/namespaces/{ns}/agent-cards/{name}"
    };
  }
  rpc ListAgentCards(ListAgentCardsRequest) returns (ListAgentCardsResponse) {
    option (google.api.http) = {
      get: "/v1/namespaces/{ns}/agent-cards"
    };
  }
  rpc DeleteAgentCard(DeleteAgentCardRequest) returns (DeleteAgentCardResponse) {
    option (google.api.http) = {
      delete: "/v1/namespaces/{ns}/agent-cards/{name}"
    };
  }
}

// ---------------------------------------------------------
// Agent Template Models
// ---------------------------------------------------------

message CreateAgentTemplateRequest {
  talon.manifests.AgentTemplate template = 1;
}

message AgentTemplateResponse {
  talon.manifests.AgentTemplate template = 1;
}

message GetAgentTemplateRequest {
  string name = 1;
}

message DeleteAgentTemplateRequest {
  string name = 1;
}

message DeleteAgentTemplateResponse {
  bool success = 1;
}

message ListAgentTemplatesRequest {
}

message ListAgentTemplatesResponse {
  repeated talon.manifests.AgentTemplate templates = 1;
}

message CreateMcpServerRequest {
  talon.manifests.McpServer server = 1;
}

message GetMcpServerRequest {
  string name = 1;
}

message ListMcpServersRequest {
}

message DeleteMcpServerRequest {
  string name = 1;
}

message DeleteMcpServerResponse {
  bool success = 1;
}

message McpServerResponse {
  talon.manifests.McpServer server = 1;
}

message ListMcpServersResponse {
  repeated talon.manifests.McpServer servers = 1;
}

message CreateMcpServerBindingRequest {
  string ns = 1;
  talon.manifests.McpServerBinding binding = 2;
}

message GetMcpServerBindingRequest {
  string ns = 1;
  string name = 2;
}

message ListMcpServerBindingsRequest {
  string ns = 1;
}

message DeleteMcpServerBindingRequest {
  string ns = 1;
  string name = 2;
}

message DeleteMcpServerBindingResponse {
  bool success = 1;
}

message McpServerBindingResponse {
  talon.manifests.McpServerBinding binding = 1;
}

message ListMcpServerBindingsResponse {
  repeated talon.manifests.McpServerBinding bindings = 1;
}

message CreateAgentCardRequest {
  string ns = 1;
  talon.manifests.AgentCard card = 2;
}

message GetAgentCardRequest {
  string ns = 1;
  string name = 2;
}

message ListAgentCardsRequest {
  string ns = 1;
}

message DeleteAgentCardRequest {
  string ns = 1;
  string name = 2;
}

message DeleteAgentCardResponse {
  bool success = 1;
}

message AgentCardResponse {
  talon.manifests.AgentCard card = 1;
}

message ListAgentCardsResponse {
  repeated talon.manifests.AgentCard cards = 1;
}

message GetAgentResponse {
  talon.models.Agent agent = 1;
}

message GetAgentRequest {
  string ns = 1;
  string name = 2;
}

message CreateAgentRequest {
  string ns = 1;
  optional string name = 2;
  talon.manifests.AgentDefinition definition = 3;
  map<string, string> labels = 4;
}

message AgentResponse {
  string agent = 1;
  string ns = 2;
  map<string, string> labels = 4;
}



message ListAgentsRequest {
  string ns = 1;
}

message ListAgentsResponse {
  repeated string agents = 1;
}



message ModifyAgentRequest {
  string agent = 1;
  string ns = 2;
  talon.manifests.AgentDefinition definition = 3;
  map<string, string> labels = 4;
}

// ---------------------------------------------------------
// Agent Knowledge Data Models
// ---------------------------------------------------------

message GetKnowledgeRequest {
  string agent = 1;
  string ns = 2;
  optional string path = 3; // If empty, returns all modules (summary)
}

message KnowledgeResponse {
  repeated talon.models.Knowledge modules = 1;
}

message SearchKnowledgeRequest {
  string agent = 1;
  string ns = 2;
  string query = 3;
}

message SearchKnowledgeResponse {
  repeated talon.models.KnowledgeSearchResult results = 1;
}

message CreateNamespaceKnowledgeRequest {
  string ns = 1;
  talon.manifests.Knowledge knowledge = 2;
}

message GetNamespaceKnowledgeRequest {
  string ns = 1;
  string name = 2;
}

message ListNamespaceKnowledgeRequest {
  string ns = 1;
}

message DeleteNamespaceKnowledgeRequest {
  string ns = 1;
  string name = 2;
}

message DeleteNamespaceKnowledgeResponse {
  bool success = 1;
}

message NamespaceKnowledgeResponse {
  talon.manifests.Knowledge knowledge = 1;
}

message ListNamespaceKnowledgeResponse {
  repeated talon.manifests.Knowledge knowledge = 1;
}

// ---------------------------------------------------------
// Agent Sessions Data Models
// ---------------------------------------------------------

message CreateSessionRequest {
  string agent = 1;
  string ns = 2;
  map<string, string> labels = 3;
}

message GetSessionRequest {
  reserved 5;
  reserved "step_limit";

  string session_id = 1;
  string agent = 2;
  string ns = 3;
  // 0 preserves legacy behavior and returns all messages. Use a negative value to return no messages.
  int32 message_limit = 4;
}

message ListSessionMessagesRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
  int32 page_size = 4;
  optional string before_message_id = 5;
}

message ListSessionMessagesResponseItem {
  reserved 2;
  reserved "steps";

  talon.models.SessionMessage message = 1;
}

message ListSessionMessagesResponse {
  string session_id = 1;
  string agent = 2;
  string state = 3;
  repeated ListSessionMessagesResponseItem items = 4;
  bool has_more = 5;
  optional string next_before_message_id = 6;
}

message ListSessionsRequest {
  string agent = 1;
  string ns = 2;
}

message SessionListItem {
  string session_id = 1;
  int64 updated_at = 2;
  map<string, string> labels = 3;
}

message ListSessionsResponse {
  repeated string session_ids = 1;
  repeated SessionListItem sessions = 2;
}

message SessionResponse {
  reserved 5;
  reserved "steps";

  string session_id = 1;
  string agent = 2;
  string state = 3;
  repeated talon.models.SessionMessage messages = 4;
  map<string, string> labels = 6;
}

message DeleteSessionRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
}

message DeleteSessionResponse {
  bool success = 1;
}

message ClearSessionRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
}

message ClearSessionResponse {
  bool success = 1;
}

message CreateChannelRequest {
  string ns = 1;
  talon.models.Channel channel = 2;
}

message GetChannelRequest {
  string ns = 1;
  string name = 2;
}

message ModifyChannelRequest {
  string ns = 1;
  string name = 2;
  talon.models.Channel channel = 3;
}

message ListChannelsRequest {
  string ns = 1;
}

message DeleteChannelRequest {
  string ns = 1;
  string name = 2;
}

message ChannelResponse {
  talon.models.Channel channel = 1;
}

message ListChannelsResponse {
  repeated talon.models.Channel channels = 1;
}

message DeleteChannelResponse {
  bool success = 1;
}

message PostChannelMessageRequest {
  string ns = 1;
  string channel = 2;
  string author_kind = 3;
  string author = 4;
  string content = 5;
  repeated string subscription_names = 6;
  map<string, string> labels = 7;
}

message RoutedChannelSession {
  string subscription = 1;
  string agent = 2;
  string session_id = 3;
  string error = 4;
}

message PostChannelMessageResponse {
  talon.models.ChannelMessage message = 1;
  repeated RoutedChannelSession routed_sessions = 2;
}

message GetChannelMessageRequest {
  string ns = 1;
  string channel = 2;
  string message_id = 3;
}

message ChannelMessageResponse {
  talon.models.ChannelMessage message = 1;
}

message ListChannelMessagesRequest {
  string ns = 1;
  string channel = 2;
  int32 limit = 3;
  int32 page_size = 4;
  optional string before_message_id = 5;
}

message ListChannelMessagesResponse {
  repeated talon.models.ChannelMessage messages = 1;
  bool has_more = 2;
  optional string next_before_message_id = 3;
}

message CreateChannelSubscriptionRequest {
  string ns = 1;
  string channel = 2;
  talon.models.ChannelSubscription subscription = 3;
}

message GetChannelSubscriptionRequest {
  string ns = 1;
  string channel = 2;
  string name = 3;
}

message ModifyChannelSubscriptionRequest {
  string ns = 1;
  string channel = 2;
  string name = 3;
  talon.models.ChannelSubscription subscription = 4;
}

message ListChannelSubscriptionsRequest {
  string ns = 1;
  string channel = 2;
}

message DeleteChannelSubscriptionRequest {
  string ns = 1;
  string channel = 2;
  string name = 3;
}

message ChannelSubscriptionResponse {
  talon.models.ChannelSubscription subscription = 1;
}

message ListChannelSubscriptionsResponse {
  repeated talon.models.ChannelSubscription subscriptions = 1;
}

message DeleteChannelSubscriptionResponse {
  bool success = 1;
}

message StreamChannelEventsRequest {
  string ns = 1;
  string channel = 2;
}

message CreateScheduleRequest {
  string ns = 1;
  talon.models.Schedule schedule = 2;
}

message GetScheduleRequest {
  string ns = 1;
  string name = 2;
}

message ModifyScheduleRequest {
  string ns = 1;
  string name = 2;
  talon.models.Schedule schedule = 3;
}

message ListSchedulesRequest {
  string ns = 1;
}

message ListSchedulesResponse {
  repeated talon.models.Schedule schedules = 1;
}

message DeleteScheduleRequest {
  string ns = 1;
  string name = 2;
}

message DeleteScheduleResponse {
  bool success = 1;
}

message CreateWorkflowRequest {
  string ns = 1;
  talon.models.Workflow workflow = 2;
}

message GetWorkflowRequest {
  string ns = 1;
  string name = 2;
}

message ListWorkflowsRequest {
  string ns = 1;
}

message DeleteWorkflowRequest {
  string ns = 1;
  string name = 2;
}

message WorkflowResponse {
  talon.models.Workflow workflow = 1;
}

message ListWorkflowsResponse {
  repeated talon.models.Workflow workflows = 1;
}

message DeleteWorkflowResponse {
  bool success = 1;
}

message CreateWorkflowRunRequest {
  string ns = 1;
  string workflow = 2;
  string input_json = 3;
  map<string, string> labels = 4;
}

message GetWorkflowRunRequest {
  string ns = 1;
  string workflow = 2;
  string run_id = 3;
}

message ListWorkflowRunsRequest {
  string ns = 1;
  string workflow = 2;
  int32 page_size = 3;
  string before_run_id = 4;
}

message ResumeWorkflowRunRequest {
  string ns = 1;
  string workflow = 2;
  string run_id = 3;
  string step_id = 4;
  string resume_json = 5;
}

message CancelWorkflowRunRequest {
  string ns = 1;
  string workflow = 2;
  string run_id = 3;
}

message StreamWorkflowEventsRequest {
  string ns = 1;
  string workflow = 2;
  string run_id = 3;
}

message WorkflowRunResponse {
  talon.models.WorkflowRun run = 1;
  repeated talon.models.WorkflowStepRun steps = 2;
}

message ListWorkflowRunsResponse {
  repeated talon.models.WorkflowRun runs = 1;
  bool has_more = 2;
  string next_before_run_id = 3;
}

message ScheduleResponse {
  talon.models.Schedule schedule = 1;
}

// ---------------------------------------------------------
// Interactivity Data Models
// ---------------------------------------------------------

message SendMessageRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
  string message = 4;
  map<string, string> labels = 5;
}

message SendMessageResponse {
  string reply = 1;
  string session_id = 4;
}

message AppendSessionMessageRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
  talon.models.SessionMessage message = 4;
}

message AppendSessionMessageResponse {
  string session_id = 1;
  talon.models.SessionMessage message = 2;
}

message StopSessionGenerationRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
}

message StopSessionGenerationResponse {
  bool success = 1;
}

message StreamSessionPartsRequest {
  string session_id = 1;
  string agent = 2;
  string ns = 3;
}

message StreamSessionPartsBatchRequest {
  // Canonical session resource names, e.g.
  // @Namespace/default/Agent/assistant/@/Session/session-123
  repeated string session_names = 1;
}

// -----------------------------------------
// Namespaces
// -----------------------------------------

message CreateNamespaceRequest {
  string name = 1;
  bool recursive = 2;
  map<string, string> labels = 3;
}

message GetNamespaceRequest {
  string name = 1;
}

message DeleteNamespaceRequest {
  string name = 1;
}

message ListNamespacesRequest {
  optional string parent = 1;
}

message NamespaceResponse {
  string name = 1;
  optional string parent = 2;
  bool is_deleted = 3;
  int64 deleted_at = 4;
  map<string, string> labels = 5;
}

message ListNamespacesResponse {
  repeated NamespaceResponse namespaces = 1;
}
