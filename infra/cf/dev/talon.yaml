providers:
  mock:
    type: openai_compatible
    name: mock
    base_url: "http://mock-llm.internal"
    model: minimax/minimax-m2.7
    api_key:
      source: env
      key: MOCK_LLM_API_KEY
default_provider: mock
control_plane:
  database:
    driver: d1
  message_broker:
    driver: cf_queues
  object_store:
    driver: r2
