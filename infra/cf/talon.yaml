providers:
  openai:
    type: openai_compatible
    name: openai
    base_url: "https://api.openai.com/v1"
    model: gpt-4o-mini
    api_key:
      source: env
      key: OPENAI_API_KEY
default_provider: openai
control_plane:
  database:
    driver: d1
  message_broker:
    driver: cf_queues
  object_store:
    driver: r2
