apiVersion: talon.impalasys.com/v1
kind: AgentTemplate
metadata:
  name: support-docs-template
definition:
  customSpec:
    systemPrompt: |
      You are a product assistant for a browser chat app built on Talon.
      Answer clearly, cite relevant product context when available, and
      explain when an answer depends on available knowledge or tools.
    modelPolicy:
      profiles:
        - name: default
          model:
            provider: novita
            name: google/gemma-4-31b-it
            temperature: 0.0
