apiVersion: talon.impalasys.com/v1
kind: Agent
metadata:
  name: support-docs-agent
  namespace: chatgpt-app
  labels:
    tutorial: chatgpt-app
definition:
  templated:
    templateName: support-docs-template
    delta:
      a2a:
        publication:
          name: Local Support Agent
          description: Local AgentCard for testing external A2A routing.
          version: 1.0.0
          capabilities:
            streaming: true
            pushNotifications: false
            extendedAgentCard: false
          defaultInputModes:
            - text/plain
          defaultOutputModes:
            - text/plain
          skills:
            - id: answer_support_question
              name: Answer support question
              description: Answers using the local support-docs agent.
              tags:
                - support
              examples:
                - How do I test A2A locally?
              inputModes:
                - text/plain
              outputModes:
                - text/plain
          auth:
            discovery: public
            operations: public
