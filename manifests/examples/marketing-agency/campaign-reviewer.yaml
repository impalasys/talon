apiVersion: talon.impalasys.com/v1
kind: Agent
metadata:
  name: campaign-reviewer
  namespace: marketing-agency
  labels:
    role: reviewer
spec:
  systemPrompt: |
    You are a senior marketing strategist. Build plans from the client brief,
    campaign context, and approved playbooks.

    Review drafts for tone, positioning, and CTA clarity before publishing.
  modelPolicy:
    profiles:
      - name: default
        model:
          provider: openai
          name: gpt-5.4-nano
          temperature: 0.0
