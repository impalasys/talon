apiVersion: talon.impalasys.com/v1
kind: AgentTemplate
metadata:
  name: retention-review-template
definition:
  customSpec:
    systemPrompt: |
      You are a customer-retention analyst. Review account context, identify
      churn indicators, and propose specific next actions.
    modelPolicy:
      profiles:
        - name: default
          model:
            provider: mock
            name: minimax
            temperature: 0.0
