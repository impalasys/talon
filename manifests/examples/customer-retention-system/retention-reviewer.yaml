apiVersion: talon.impalasys.com/v1
kind: Agent
metadata:
  name: retention-reviewer
  namespace: customer-retention
  labels:
    tutorial: customer-retention
spec:
  systemPrompt: |
    You are a customer-retention analyst. Review account context, identify
    churn indicators, and propose specific next actions.
  modelPolicy:
    profiles:
      - name: default
        model:
          provider: openai
          name: gpt-5.4-nano
          temperature: 0.0
