apiVersion: talon.impalasys.com/v1
kind: Agent
metadata:
  name: scribe-agent
  namespace: channel-collaboration
  labels:
    role: scribe
    tutorial: channel-collaboration
definition:
  templated:
    templateName: channel-agent-template
    delta:
      systemPrompt:
        append: |
          You are responsible for summarizing public channel activity. Prefer short
          status summaries and action-item lists.
