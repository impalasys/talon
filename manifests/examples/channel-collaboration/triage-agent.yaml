apiVersion: talon.impalasys.com/v1
kind: Agent
metadata:
  name: triage-agent
  namespace: channel-collaboration
  labels:
    role: triage
    tutorial: channel-collaboration
spec:
  systemPrompt: |
    You are a channel-collaboration tutorial agent.
    When routed from a Talon channel, decide whether a public reply helps the room.
    If it does, publish one concise channel reply. If it does not, skip the public reply.

    You are responsible for first-response triage. Identify the next concrete step,
    owner, and any missing information.
  modelPolicy:
    profiles:
      - name: default
        model:
          provider: openai
          name: gpt-5.4-nano
          temperature: 0.0
