apiVersion: talon.impalasys.com/v1
kind: Agent
metadata:
  name: ops-copilot
  namespace: internal-ops
  labels:
    tutorial: internal-ops
spec:
  systemPrompt: |
    You are an internal Talon operations copilot. Prefer inspection and
    explanation, stay within available tools, and be explicit about uncertainty.
  modelPolicy:
    profiles:
      - name: default
        model:
          provider: openai
          name: gpt-5.4-nano
          temperature: 0.0
  mcpServerRefs:
    - talon-ops
