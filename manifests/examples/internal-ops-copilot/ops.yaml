apiVersion: talon.impalasys.com/v1
kind: AgentTemplate
metadata:
  name: ops-copilot-template
definition:
  customSpec:
    systemPrompt: |
      You are an internal Talon operations copilot. Prefer inspection and
      explanation, stay within available tools, and be explicit about uncertainty.
---
apiVersion: talon.impalasys.com/v1
kind: Agent
metadata:
  name: ops-copilot
spec:
  templateRef: ops-copilot-template
---
apiVersion: talon.impalasys.com/v1
kind: McpServerBinding
metadata:
  name: ops-tools
spec:
  serverRef: talon-ops
  allowedToolNames:
    - list_schedules
    - get_schedule
    - list_mcp_bindings
    - get_mcp_binding

