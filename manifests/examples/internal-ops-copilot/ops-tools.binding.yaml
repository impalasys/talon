apiVersion: talon.impalasys.com/v1
kind: McpServerBinding
metadata:
  name: ops-tools
  namespace: internal-ops
spec:
  serverRef: talon-ops
  allowedToolNames:
    - list_schedules
    - get_schedule
    - list_channels
    - get_channel
    - list_channel_messages
    - get_channel_message
    - list_mcp_bindings
    - get_mcp_binding
