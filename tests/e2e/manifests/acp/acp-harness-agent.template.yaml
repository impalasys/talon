apiVersion: talon.impalasys.com/v1
kind: Template
metadata:
  name: coding-agent
  namespace: "{{ vars.source_ns }}"
spec:
  kind: Agent
  metadata:
    name: coding
  spec:
    runtime:
      kind: acp
      acp:
        command: "{{ vars.acp_command }}"
        args:
{{ vars.acp_args_yaml }}
        cwd: /workspace
        sandboxPolicyRef: coding
        persistSession: false
        env:
{{ vars.acp_env_yaml }}
        permissionPolicy:
          default: allow
          filesystemWrite: allow
          filesystemRead: allow
          terminal: allow
    systemPrompt: |
      You are the {{ vars.acp_harness_label }} ACP coding agent for {% raw %}{{ namespace.name }}{% endraw %}.
