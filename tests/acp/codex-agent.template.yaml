apiVersion: talon.impalasys.com/v1
kind: Template
metadata:
  name: coding-agent
  namespace: __SOURCE_NS__
spec:
  kind: Agent
  metadata:
    name: coding
  spec:
    runtime:
      kind: acp
      acp:
        command: __CODEX_ACP_COMMAND__
        args: []
        cwd: "."
        sandboxPolicyRef: coding
        persistSession: false
        env:
          TALON_CODEX_COMMAND: __CODEX_COMMAND__
        permissionPolicy:
          default: allow
          filesystemWrite: allow
          filesystemRead: allow
          terminal: allow
    systemPrompt: |
      You are the real Codex coding agent for {{ namespace.name }}.
