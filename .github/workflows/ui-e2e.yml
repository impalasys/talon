name: Talon UI E2E

on:
  pull_request:
    paths:
      - ".github/workflows/ui-e2e.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "tests/**"
      - "ui/**"
  push:
    branches:
      - main
      - "internal-preview/**"
    paths:
      - ".github/workflows/ui-e2e.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "tests/**"
      - "ui/**"

concurrency:
  group: talon-oss-ui-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui_e2e:
    name: UI E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Rust build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install E2E Python dependencies
        run: python -m pip install -r tests/requirements.txt

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: ui
        run: pnpm exec playwright install --with-deps chromium

      - name: Run UI E2E tests
        working-directory: ui
        run: pnpm exec playwright test e2e/app.spec.ts e2e/chat.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            ui/playwright-report
            ui/test-results
