name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened, closed]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: CLA
    runs-on: ubuntu-latest
    steps:
      - name: Verify contributor CLA
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: ".github/cla-signatures/version1/cla.json"
          path-to-document: "https://github.com/impalasys/talon/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: "ShukantPal,dependabot[bot],github-actions[bot]"
          create-file-commit-message: "Create CLA signature store"
          signed-commit-message: "$contributorName signed the Talon CLA for $owner/$repo#$pullRequestNo"
          custom-notsigned-prcomment: >
            Thanks for the contribution. Before we can review or merge this pull request,
            every contributor on it needs to sign the Talon CLA by replying on this PR with:
            `I have read the CLA Document and I hereby sign the CLA`
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors on this pull request have signed the Talon CLA."
          lock-pullrequest-aftermerge: false
