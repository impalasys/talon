name: Publish Packages

on:
  push:
    branches:
      - main
    paths:
      - "sdk/**"
      - "packages/talon-chat/**"
      - "proto/**"
      - "scripts/sdk/**"
      - "buf.gen.sdk.yaml"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  detect:
    name: Detect Version Changes
    runs-on: ubuntu-latest
    outputs:
      go_changed: ${{ steps.detect.outputs.go_changed }}
      go_client_changed: ${{ steps.detect.outputs.go_client_changed }}
      go_client_version: ${{ steps.detect.outputs.go_client_version }}
      go_server_changed: ${{ steps.detect.outputs.go_server_changed }}
      go_server_version: ${{ steps.detect.outputs.go_server_version }}
      rust_changed: ${{ steps.detect.outputs.rust_changed }}
      rust_client_changed: ${{ steps.detect.outputs.rust_client_changed }}
      rust_client_version: ${{ steps.detect.outputs.rust_client_version }}
      rust_server_changed: ${{ steps.detect.outputs.rust_server_changed }}
      rust_server_version: ${{ steps.detect.outputs.rust_server_version }}
      python_changed: ${{ steps.detect.outputs.python_changed }}
      python_client_changed: ${{ steps.detect.outputs.python_client_changed }}
      python_server_changed: ${{ steps.detect.outputs.python_server_changed }}
      js_changed: ${{ steps.detect.outputs.js_changed }}
      js_client_changed: ${{ steps.detect.outputs.js_client_changed }}
      js_client_version: ${{ steps.detect.outputs.js_client_version }}
      js_server_changed: ${{ steps.detect.outputs.js_server_changed }}
      js_server_version: ${{ steps.detect.outputs.js_server_version }}
      js_node_linux_changed: ${{ steps.detect.outputs.js_node_linux_changed }}
      js_node_linux_version: ${{ steps.detect.outputs.js_node_linux_version }}
      js_node_darwin_changed: ${{ steps.detect.outputs.js_node_darwin_changed }}
      js_node_darwin_version: ${{ steps.detect.outputs.js_node_darwin_version }}
      js_chat_changed: ${{ steps.detect.outputs.js_chat_changed }}
      js_chat_version: ${{ steps.detect.outputs.js_chat_version }}
      java_changed: ${{ steps.detect.outputs.java_changed }}
      needs_node_binaries: ${{ steps.detect.outputs.needs_node_binaries }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Detect changed SDK versions
        id: detect
        env:
          BASE_SHA: ${{ github.event.before }}
        run: python3 scripts/sdk/detect_version_changes.py

  build-node-binaries:
    name: Build talon-node SDK Binary
    if: needs.detect.outputs.needs_node_binaries == 'true'
    needs: detect
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: darwin-arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          brew install protobuf

      - name: Configure protoc
        run: |
          set -euo pipefail
          protoc_path="$(command -v protoc)"
          echo "PROTOC=${protoc_path}" >> "$GITHUB_ENV"
          "${protoc_path}" --version

      - name: Build talon-node
        run: cargo build --locked --release --bin talon-node

      - name: Package talon-node
        run: |
          set -euo pipefail
          mkdir -p "dist/talon-node-${{ matrix.platform }}"
          cp "target/release/talon-node" "dist/talon-node-${{ matrix.platform }}/"
          tar -C dist -czf "dist/talon-node-${{ matrix.platform }}.tar.gz" "talon-node-${{ matrix.platform }}"
          python3 -c 'import hashlib, pathlib, sys; p = pathlib.Path(sys.argv[1]); print(f"{hashlib.sha256(p.read_bytes()).hexdigest()}  {p}")' "dist/talon-node-${{ matrix.platform }}.tar.gz" > "dist/talon-node-${{ matrix.platform }}.tar.gz.sha256"

      - name: Upload talon-node binary
        uses: actions/upload-artifact@v4
        with:
          name: talon-node-${{ matrix.platform }}
          path: |
            dist/talon-node-${{ matrix.platform }}.tar.gz
            dist/talon-node-${{ matrix.platform }}.tar.gz.sha256
          if-no-files-found: error

  publish-go:
    name: Publish Go Module Tags
    if: needs.detect.outputs.go_changed == 'true'
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push Go module tags
        env:
          GO_CLIENT_CHANGED: ${{ needs.detect.outputs.go_client_changed }}
          GO_CLIENT_VERSION: ${{ needs.detect.outputs.go_client_version }}
          GO_SERVER_CHANGED: ${{ needs.detect.outputs.go_server_changed }}
          GO_SERVER_VERSION: ${{ needs.detect.outputs.go_server_version }}
        run: |
          set -euo pipefail
          tag_if_changed() {
            local changed="$1"
            local tag="$2"
            if [ "$changed" != "true" ]; then
              return 0
            fi
            if git rev-parse "$tag" >/dev/null 2>&1; then
              echo "Tag $tag already exists; skipping"
              return 0
            fi
            git tag "$tag" "$GITHUB_SHA"
            git push origin "$tag"
          }
          tag_if_changed "$GO_CLIENT_CHANGED" "sdk/go/talon-client/v${GO_CLIENT_VERSION}"
          tag_if_changed "$GO_SERVER_CHANGED" "sdk/go/talon-server/v${GO_SERVER_VERSION}"

  publish-rust:
    name: Publish Rust Crates
    if: always() && needs.detect.outputs.rust_changed == 'true' && (needs.detect.outputs.rust_server_changed != 'true' || needs.build-node-binaries.result == 'success')
    needs:
      - detect
      - build-node-binaries
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Download talon-node binaries
        if: needs.detect.outputs.rust_server_changed == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: talon-node-*
          path: dist
          merge-multiple: true

      - name: Install talon-node binaries into Rust package
        if: needs.detect.outputs.rust_server_changed == 'true'
        run: |
          set -euo pipefail
          for platform in linux-x64 darwin-arm64; do
            mkdir -p "sdk/rust/talon-server/bin/${platform}"
            tar -xzf "dist/talon-node-${platform}.tar.gz" -C /tmp
            cp "/tmp/talon-node-${platform}/talon-node" "sdk/rust/talon-server/bin/${platform}/talon-node"
          done

      - name: Publish changed Rust crates
        env:
          RUST_CLIENT_CHANGED: ${{ needs.detect.outputs.rust_client_changed }}
          RUST_SERVER_CHANGED: ${{ needs.detect.outputs.rust_server_changed }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "CARGO_REGISTRY_TOKEN is required"
            exit 1
          fi
          if [ "$RUST_CLIENT_CHANGED" = "true" ]; then
            cargo publish --manifest-path sdk/rust/talon-client/Cargo.toml
          fi
          if [ "$RUST_SERVER_CHANGED" = "true" ]; then
            cargo publish --manifest-path sdk/rust/talon-server/Cargo.toml
          fi

  publish-npm:
    name: Publish npm Packages
    if: always() && needs.detect.outputs.js_changed == 'true' && ((needs.detect.outputs.js_node_linux_changed != 'true' && needs.detect.outputs.js_node_darwin_changed != 'true') || needs.build-node-binaries.result == 'success')
    needs:
      - detect
      - build-node-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Download talon-node binaries
        if: needs.detect.outputs.js_node_linux_changed == 'true' || needs.detect.outputs.js_node_darwin_changed == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: talon-node-*
          path: dist
          merge-multiple: true

      - name: Install talon-node binaries into npm packages
        if: needs.detect.outputs.js_node_linux_changed == 'true' || needs.detect.outputs.js_node_darwin_changed == 'true'
        run: |
          set -euo pipefail
          if [ "${{ needs.detect.outputs.js_node_linux_changed }}" = "true" ]; then
            mkdir -p sdk/js/talon-node-linux-x64/bin
            tar -xzf dist/talon-node-linux-x64.tar.gz -C /tmp
            cp /tmp/talon-node-linux-x64/talon-node sdk/js/talon-node-linux-x64/bin/talon-node
          fi
          if [ "${{ needs.detect.outputs.js_node_darwin_changed }}" = "true" ]; then
            mkdir -p sdk/js/talon-node-darwin-arm64/bin
            tar -xzf dist/talon-node-darwin-arm64.tar.gz -C /tmp
            cp /tmp/talon-node-darwin-arm64/talon-node sdk/js/talon-node-darwin-arm64/bin/talon-node
          fi

      - name: Build Talon chat package
        if: needs.detect.outputs.js_chat_changed == 'true'
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @impalasys/talon-chat build

      - name: Build JS SDK packages
        if: needs.detect.outputs.js_client_changed == 'true' || needs.detect.outputs.js_server_changed == 'true'
        working-directory: sdk/js
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @impalasys/talon-client build
          pnpm --filter @impalasys/talon-server build

      - name: Publish changed npm packages
        env:
          JS_CLIENT_CHANGED: ${{ needs.detect.outputs.js_client_changed }}
          JS_CLIENT_VERSION: ${{ needs.detect.outputs.js_client_version }}
          JS_SERVER_CHANGED: ${{ needs.detect.outputs.js_server_changed }}
          JS_SERVER_VERSION: ${{ needs.detect.outputs.js_server_version }}
          JS_NODE_LINUX_CHANGED: ${{ needs.detect.outputs.js_node_linux_changed }}
          JS_NODE_LINUX_VERSION: ${{ needs.detect.outputs.js_node_linux_version }}
          JS_NODE_DARWIN_CHANGED: ${{ needs.detect.outputs.js_node_darwin_changed }}
          JS_NODE_DARWIN_VERSION: ${{ needs.detect.outputs.js_node_darwin_version }}
          JS_CHAT_CHANGED: ${{ needs.detect.outputs.js_chat_changed }}
          JS_CHAT_VERSION: ${{ needs.detect.outputs.js_chat_version }}
        run: |
          set -euo pipefail
          publish_if_changed() {
            local changed="$1"
            local package="$2"
            local version="$3"
            local package_path="$4"
            if [ "$changed" != "true" ]; then
              return 0
            fi
            if npm view "${package}@${version}" version >/dev/null 2>&1; then
              echo "${package}@${version} already exists; skipping"
              return 0
            fi
            local pack_dir
            pack_dir="$(mktemp -d)"
            pnpm --dir "$package_path" pack --pack-destination "$pack_dir"
            npm publish "$pack_dir"/*.tgz --access public
          }
          publish_if_changed "$JS_CHAT_CHANGED" "@impalasys/talon-chat" "$JS_CHAT_VERSION" "packages/talon-chat"
          publish_if_changed "$JS_NODE_LINUX_CHANGED" "@impalasys/talon-node-linux-x64" "$JS_NODE_LINUX_VERSION" "sdk/js/talon-node-linux-x64"
          publish_if_changed "$JS_NODE_DARWIN_CHANGED" "@impalasys/talon-node-darwin-arm64" "$JS_NODE_DARWIN_VERSION" "sdk/js/talon-node-darwin-arm64"
          publish_if_changed "$JS_CLIENT_CHANGED" "@impalasys/talon-client" "$JS_CLIENT_VERSION" "sdk/js/talon-client"
          publish_if_changed "$JS_SERVER_CHANGED" "@impalasys/talon-server" "$JS_SERVER_VERSION" "sdk/js/talon-server"

  publish-python:
    name: Publish Python Packages
    if: needs.detect.outputs.python_changed == 'true'
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build changed Python packages
        env:
          PYTHON_CLIENT_CHANGED: ${{ needs.detect.outputs.python_client_changed }}
          PYTHON_SERVER_CHANGED: ${{ needs.detect.outputs.python_server_changed }}
        run: |
          set -euo pipefail
          python -m pip install build
          mkdir -p sdk/python/dist
          if [ "$PYTHON_CLIENT_CHANGED" = "true" ]; then
            python -m build sdk/python/talon-client --outdir sdk/python/dist
          fi
          if [ "$PYTHON_SERVER_CHANGED" = "true" ]; then
            python -m build sdk/python/talon-server --outdir sdk/python/dist
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist
          skip-existing: true

  publish-java:
    name: Publish Java Packages
    if: needs.detect.outputs.java_changed == 'true'
    needs: detect
    runs-on: ubuntu-latest
    env:
      MAVEN_PUBLISH_URL: ${{ secrets.MAVEN_PUBLISH_URL }}
      MAVEN_PUBLISH_USERNAME: ${{ secrets.MAVEN_PUBLISH_USERNAME }}
      MAVEN_PUBLISH_PASSWORD: ${{ secrets.MAVEN_PUBLISH_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.14.3"

      - name: Publish Java SDKs
        working-directory: sdk/java
        run: |
          set -euo pipefail
          if [ -z "${MAVEN_PUBLISH_URL}" ]; then
            echo "MAVEN_PUBLISH_URL is required"
            exit 1
          fi
          gradle publish
