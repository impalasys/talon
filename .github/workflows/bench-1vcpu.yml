name: Talon 1 vCPU Benchmark

# Managed by Copybara from impalasys/code.
# Keep this repo-root workflow mirrored from the monorepo overlay.

on:
  pull_request:
    paths:
      - ".github/workflows/bench-1vcpu.yml"
      - "bench/**"
      - "src/**"
      - "proto/**"
      - "tests/generated/proto/**"
      - "Cargo.toml"
      - "Cargo.lock"
  push:
    branches:
      - main
      - "internal-preview/**"
    paths:
      - ".github/workflows/bench-1vcpu.yml"
      - "bench/**"
      - "src/**"
      - "proto/**"
      - "tests/generated/proto/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:
    inputs:
      agents:
        description: "Concurrent agent/session count"
        required: true
        default: "1000"
      memory:
        description: "Talon container memory limit"
        required: true
        default: "512m"
      timeout_seconds:
        description: "Benchmark workload timeout"
        required: true
        default: "900"

concurrency:
  group: talon-1vcpu-bench-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: 1 vCPU Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      BENCH_AGENTS: ${{ github.event_name == 'workflow_dispatch' && inputs.agents || '1000' }}
      BENCH_MEMORY: ${{ github.event_name == 'workflow_dispatch' && inputs.memory || '512m' }}
      BENCH_TIMEOUT_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.timeout_seconds || '900' }}
      BENCH_IMAGE_TAG: talon-bench-runtime:${{ github.sha }}
      BENCH_OUTPUT_DIR: bench/results/ci-1vcpu
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install googleapis-common-protos grpcio protobuf

      - name: Show Docker environment
        run: |
          docker version
          docker compose version

      - name: Run 1 vCPU benchmark
        run: |
          python bench/benchmark_1000_agents.py \
            --agents "${BENCH_AGENTS}" \
            --latencies 0 \
            --memory "${BENCH_MEMORY}" \
            --timeout-seconds "${BENCH_TIMEOUT_SECONDS}" \
            --send-concurrency "${BENCH_AGENTS}" \
            --stream-mode batch \
            --mock-cpus 4 \
            --mock-memory 2g \
            --mock-request-backlog 8192 \
            --progress-interval-seconds 10 \
            --image-tag "${BENCH_IMAGE_TAG}" \
            --output-dir "${BENCH_OUTPUT_DIR}"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: talon-1vcpu-benchmark-${{ github.sha }}
          path: bench/results/ci-1vcpu/
          if-no-files-found: warn
          retention-days: 14
