name: Talon 1 vCPU Benchmark

# Managed by Copybara from impalasys/code.
# Keep this repo-root workflow mirrored from the monorepo overlay.

on:
  pull_request:
    paths:
      - ".github/workflows/bench-1vcpu.yml"
      - "bench/**"
      - "src/**"
      - "proto/**"
      - "tests/generated/proto/**"
      - "Cargo.toml"
      - "Cargo.lock"
  push:
    branches:
      - main
      - "internal-preview/**"
    paths:
      - ".github/workflows/bench-1vcpu.yml"
      - "bench/**"
      - "src/**"
      - "proto/**"
      - "tests/generated/proto/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:
    inputs:
      agents:
        description: "Concurrent agent/session count"
        required: true
        default: "7000"
      memory:
        description: "SQLite Talon container memory limit"
        required: true
        default: "512m"
      rocksdb_memory:
        description: "RocksDB Talon container memory limit"
        required: true
        default: "768m"
      timeout_seconds:
        description: "Benchmark workload timeout"
        required: true
        default: "900"

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: talon-1vcpu-bench-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: 1 vCPU Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      BENCH_AGENTS: ${{ github.event_name == 'workflow_dispatch' && inputs.agents || '7000' }}
      BENCH_MEMORY: ${{ github.event_name == 'workflow_dispatch' && inputs.memory || '512m' }}
      BENCH_ROCKSDB_MEMORY: ${{ github.event_name == 'workflow_dispatch' && inputs.rocksdb_memory || '768m' }}
      BENCH_TIMEOUT_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.timeout_seconds || '900' }}
      BENCH_IMAGE_TAG: talon-bench-runtime:${{ github.sha }}
      BENCH_OUTPUT_DIR: bench/results/ci-1vcpu
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install googleapis-common-protos grpcio protobuf

      - name: Show Docker environment
        run: |
          docker version
          docker compose version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build benchmark runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/oss-runtime.Dockerfile
          tags: ${{ env.BENCH_IMAGE_TAG }}
          push: false
          load: true
          cache-from: type=gha,scope=talon-bench-runtime
          cache-to: type=gha,mode=max,scope=talon-bench-runtime

      - name: Run 1 vCPU benchmark matrix
        run: |
          status=0

          python bench/benchmark_1000_agents.py \
            --skip-build \
            --database sqlite \
            --agents "${BENCH_AGENTS}" \
            --latencies 0 \
            --memory "${BENCH_MEMORY}" \
            --timeout-seconds "${BENCH_TIMEOUT_SECONDS}" \
            --send-concurrency "${BENCH_AGENTS}" \
            --worker-concurrency "${BENCH_AGENTS}" \
            --stream-mode batch \
            --mock-request-backlog 8192 \
            --progress-interval-seconds 10 \
            --image-tag "${BENCH_IMAGE_TAG}" \
            --output-dir "${BENCH_OUTPUT_DIR}/sqlite" || status=1

          python bench/benchmark_1000_agents.py \
            --skip-build \
            --database rocksdb \
            --agents "${BENCH_AGENTS}" \
            --latencies 0 \
            --memory "${BENCH_ROCKSDB_MEMORY}" \
            --timeout-seconds "${BENCH_TIMEOUT_SECONDS}" \
            --send-concurrency "${BENCH_AGENTS}" \
            --worker-concurrency "${BENCH_AGENTS}" \
            --stream-mode batch \
            --mock-request-backlog 8192 \
            --progress-interval-seconds 10 \
            --rocksdb-compression none \
            --rocksdb-write-buffer-size-mb 16 \
            --rocksdb-max-write-buffer-number 2 \
            --rocksdb-block-cache-size-mb 16 \
            --rocksdb-max-background-jobs 2 \
            --image-tag "${BENCH_IMAGE_TAG}" \
            --output-dir "${BENCH_OUTPUT_DIR}/rocksdb" || status=1

          exit "${status}"

      - name: Comment benchmark results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const marker = "<!-- talon-1vcpu-benchmark -->";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            function findResultJson(dir) {
              if (!fs.existsSync(dir)) {
                return null;
              }
              const name = fs.readdirSync(dir)
                .find((entry) => entry.startsWith("talon-bench-") && entry.endsWith(".json"));
              return name ? path.join(dir, name) : null;
            }

            function formatSeconds(value) {
              return Number.isFinite(value) ? `${value.toFixed(2)}s` : "n/a";
            }

            function formatRate(value) {
              return Number.isFinite(value) ? value.toFixed(2) : "n/a";
            }

            function formatMemory(bytes) {
              return Number.isFinite(bytes) ? `${(bytes / 1024 / 1024).toFixed(1)} MiB` : "n/a";
            }

            function row(database, dirName, memory) {
              const resultPath = findResultJson(path.join(process.env.BENCH_OUTPUT_DIR, dirName));
              if (!resultPath) {
                return `| ${database} | ${memory} | n/a | n/a | n/a | n/a | n/a | n/a | n/a | no result |`;
              }
              const result = JSON.parse(fs.readFileSync(resultPath, "utf8"));
              const workload = result.workload || {};
              const p95 = workload.send_to_done_seconds?.p95;
              const peakMemory = result.talon_container?.peak_memory_usage_bytes;
              const oom = result.talon_container?.oom_killed ? "yes" : "no";
              const status = workload.success_count >= Number(process.env.BENCH_AGENTS)
                ? "pass"
                : "failed";
              return [
                `| ${database}`,
                memory,
                workload.success_count ?? "n/a",
                workload.error_count ?? "n/a",
                workload.timeout_count ?? "n/a",
                formatSeconds(workload.workload_seconds),
                formatRate(workload.throughput_completed_per_second),
                formatSeconds(p95),
                formatMemory(peakMemory),
                `${oom} / ${status} |`,
              ].join(" | ");
            }

            const matrix = [
              "| Database | Memory | Success | Errors | Timeouts | Workload seconds | Completed/sec | p95 send-to-done | Peak memory | OOM / Status |",
              "| :--- | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | :--- |",
              row("SQLite", "sqlite", process.env.BENCH_MEMORY),
              row("RocksDB", "rocksdb", process.env.BENCH_ROCKSDB_MEMORY),
            ].join("\n");

            const body = [
              marker,
              "## Talon 1 vCPU Benchmark",
              "",
              matrix,
              "",
              `Config: ${process.env.BENCH_AGENTS} concurrent agents, 1 vCPU Talon, batch stream. SQLite memory: ${process.env.BENCH_MEMORY}. RocksDB memory: ${process.env.BENCH_ROCKSDB_MEMORY}.`,
              "",
              `Run: ${runUrl}`,
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: talon-1vcpu-benchmark-${{ github.sha }}
          path: bench/results/ci-1vcpu/
          if-no-files-found: warn
          retention-days: 14
