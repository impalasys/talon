name: Talon OSS CI

on:
  pull_request:
  push:
    branches:
      - main
      - "internal-preview/**"

concurrency:
  group: talon-oss-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo:
    name: Cargo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Cargo metadata
        run: cargo metadata --locked

      - name: Cargo build
        run: cargo build --locked --bins

      - name: Cargo test
        run: cargo test --locked

  runtime_image:
    name: Runtime Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/oss-runtime.Dockerfile
          push: false
          load: false

  envoy_image:
    name: Envoy Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Generate descriptor set
        run: |
          protoc -I. -Iproto -Ithird_party/googleapis \
            --include_imports \
            --include_source_info \
            --experimental_allow_proto3_optional \
            --descriptor_set_out=talon_gateway_proto-descriptor-set.proto.bin \
            proto/gateway.proto

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build envoy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/envoy-cloudrun.Dockerfile
          push: false
          load: false

  ui:
    name: UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Build UI
        working-directory: ui
        run: pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/oss-ui.Dockerfile
          push: false
          load: false
          build-args: |
            NEXT_PUBLIC_GATEWAY_URL=http://localhost:18789

  ui_e2e:
    name: UI E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Rust build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install E2E Python dependencies
        run: python -m pip install -r tests/requirements.txt

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Build Talon E2E binaries
        run: cargo build --locked --bin talon-server --bin talon-worker

      - name: Install Playwright browser
        working-directory: ui
        run: pnpm exec playwright install --with-deps chromium

      - name: Run UI E2E tests
        working-directory: ui
        run: pnpm exec playwright test e2e/app.spec.ts e2e/chat.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            ui/playwright-report
            ui/test-results

  dispatch_monorepo_import:
    name: Dispatch Monorepo Import
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs:
      - cargo
      - runtime_image
      - envoy_image
      - ui
      - ui_e2e
    runs-on: ubuntu-latest
    steps:
      - name: Select dispatch token
        id: token
        env:
          MONOREPO_DISPATCH_TOKEN: ${{ secrets.MONOREPO_DISPATCH_TOKEN }}
          COPYBARA_GITHUB_TOKEN: ${{ secrets.COPYBARA_GITHUB_TOKEN }}
        run: |
          token="${MONOREPO_DISPATCH_TOKEN}"
          if [[ -z "${token}" ]]; then
            token="${COPYBARA_GITHUB_TOKEN}"
          fi
          if [[ -z "${token}" ]]; then
            echo "No monorepo dispatch token configured." >&2
            exit 1
          fi
          echo "::add-mask::${token}"
          echo "value=${token}" >> "$GITHUB_OUTPUT"

      - name: Dispatch Talon import to monorepo
        env:
          GH_TOKEN: ${{ steps.token.outputs.value }}
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/impalasys/code/dispatches \
            -d @- <<'EOF'
          {
            "event_type": "talon_public_main_updated",
            "client_payload": {
              "public_sha": "${{ github.sha }}",
              "public_ref": "${{ github.ref }}",
              "source_repo": "${{ github.repository }}",
              "workflow": "${{ github.workflow }}"
            }
          }
          EOF
