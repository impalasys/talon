name: Talon OSS CI

# Managed by Copybara from impalasys/code.
# Keep this repo-root workflow mirrored from the monorepo overlay.

on:
  pull_request:
  push:
    branches:
      - main
      - "internal-preview/**"

concurrency:
  group: talon-oss-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  cargo:
    name: Cargo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Cargo metadata
        run: cargo metadata --locked

      - name: Cargo build
        run: cargo build --locked --bins

      - name: Cargo test
        run: cargo test --locked

  runtime_image:
    name: Runtime Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/oss-runtime.Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          load: false
          tags: |
            ghcr.io/impalasys/talon-runtime:latest
            ghcr.io/impalasys/talon-runtime:sha-${{ github.sha }}

  envoy_image:
    name: Envoy Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Generate descriptor set
        run: |
          protoc -I. -Iproto -Ithird_party/googleapis \
            --include_imports \
            --include_source_info \
            --experimental_allow_proto3_optional \
            --descriptor_set_out=talon_gateway_proto-descriptor-set.proto.bin \
            proto/gateway.proto

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build envoy image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/envoy-cloudrun.Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          load: false
          tags: |
            ghcr.io/impalasys/talon-envoy-cloudrun:latest
            ghcr.io/impalasys/talon-envoy-cloudrun:sha-${{ github.sha }}

  ui:
    name: UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Build UI
        working-directory: ui
        run: pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build UI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/oss-ui.Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          load: false
          tags: |
            ghcr.io/impalasys/talon-ui:latest
            ghcr.io/impalasys/talon-ui:sha-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_GATEWAY_URL=http://localhost:18789

  sdk:
    name: SDKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.14.3"

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Install Go protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1

      - name: Regenerate SDK clients
        run: scripts/sdk/generate.sh

      - name: Verify SDK package versions
        run: python3 scripts/sdk/check_versions.py

      - name: Verify generated SDK clients are checked in
        run: git diff --exit-code -- sdk scripts buf.gen.sdk.yaml

      - name: Test Go SDKs
        run: |
          (cd sdk/go/talon-client && go test ./...)
          (cd sdk/go/talon-server && go test ./...)

      - name: Test Rust SDKs
        run: cargo test --manifest-path sdk/rust/Cargo.toml

      - name: Test Java SDKs
        working-directory: sdk/java
        run: gradle test

      - name: Test Python SDKs
        run: |
          python -m pip install -e sdk/python/talon-client -e sdk/python/talon-server pytest
          pytest -q sdk/python/talon-client/tests sdk/python/talon-server/tests

      - name: Test JS SDKs
        run: |
          pnpm install --frozen-lockfile
          pnpm --dir sdk/js check:packages
          pnpm --dir sdk/js typecheck
          pnpm --dir sdk/js test

  a2a_compat:
    name: A2A Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Build Talon binaries
        run: cargo build --locked --bins

      - name: Install Python test dependencies
        run: python -m pip install -r tests/requirements.txt

      - name: Run upstream A2A SDK compatibility test
        run: pytest -q tests/test_a2a_compat.py

  binary_artifacts:
    name: Binary Artifacts
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs:
      - cargo
      - runtime_image
      - envoy_image
      - ui
      - sdk
      - a2a_compat
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-x86_64
            sdk_platform: linux-x64
          - os: macos-14
            artifact_name: darwin-arm64
            sdk_platform: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Build release binaries
        run: cargo build --locked --release --bins

      - name: Generate gateway descriptor
        if: runner.os == 'Linux'
        run: |
          protoc -I. -Iproto -Ithird_party/googleapis \
            --include_imports \
            --include_source_info \
            --experimental_allow_proto3_optional \
            --descriptor_set_out=talon_gateway_proto-descriptor-set.proto.bin \
            proto/gateway.proto

      - name: Package binaries
        run: |
          ARTIFACT_DIR="dist/talon-${{ matrix.artifact_name }}"
          mkdir -p "$ARTIFACT_DIR"
          cp target/release/talon-server "$ARTIFACT_DIR"/
          cp target/release/talon-worker "$ARTIFACT_DIR"/
          cp target/release/talon-cli "$ARTIFACT_DIR"/
          cp target/release/talon-node "$ARTIFACT_DIR"/
          cp talon.yaml "$ARTIFACT_DIR"/
          if [ "${RUNNER_OS}" = "Linux" ]; then
            cp talon_gateway_proto-descriptor-set.proto.bin "$ARTIFACT_DIR"/
          fi
          if [ "${RUNNER_OS}" = "macOS" ]; then
            (
              cd "$ARTIFACT_DIR"
              shasum -a 256 talon-server talon-worker talon-cli talon-node talon.yaml > SHA256SUMS
            )
          else
            (
              cd "$ARTIFACT_DIR"
              sha256sum \
                talon-server \
                talon-worker \
                talon-cli \
                talon-node \
                talon.yaml \
                talon_gateway_proto-descriptor-set.proto.bin > SHA256SUMS
            )
          fi
          tar -C dist -czf "dist/talon-${{ matrix.artifact_name }}-${GITHUB_SHA}.tar.gz" "talon-${{ matrix.artifact_name }}"
          SDK_NODE_DIR="dist/talon-node-${{ matrix.sdk_platform }}"
          mkdir -p "$SDK_NODE_DIR"
          cp target/release/talon-node "$SDK_NODE_DIR"/
          tar -C dist -czf "dist/talon-node-${{ matrix.sdk_platform }}.tar.gz" "talon-node-${{ matrix.sdk_platform }}"
          if [ "${RUNNER_OS}" = "macOS" ]; then
            shasum -a 256 "dist/talon-node-${{ matrix.sdk_platform }}.tar.gz" > "dist/talon-node-${{ matrix.sdk_platform }}.tar.gz.sha256"
          else
            sha256sum "dist/talon-node-${{ matrix.sdk_platform }}.tar.gz" > "dist/talon-node-${{ matrix.sdk_platform }}.tar.gz.sha256"
          fi

      - name: Upload binary artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: talon-${{ matrix.artifact_name }}-${{ github.sha }}
          path: |
            dist/talon-${{ matrix.artifact_name }}-${{ github.sha }}.tar.gz
            dist/talon-${{ matrix.artifact_name }}/SHA256SUMS
            dist/talon-node-${{ matrix.sdk_platform }}.tar.gz
            dist/talon-node-${{ matrix.sdk_platform }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14
