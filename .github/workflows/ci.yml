name: Talon OSS CI

# Managed by Copybara from impalasys/code.
# Keep this repo-root workflow mirrored from the monorepo overlay.

on:
  pull_request:
  push:
    branches:
      - main
      - "internal-preview/**"

concurrency:
  group: talon-oss-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo:
    name: Cargo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Cargo metadata
        run: cargo metadata --locked

      - name: Cargo build
        run: cargo build --locked --bins

      - name: Cargo test
        run: cargo test --locked

  runtime_image:
    name: Runtime Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/oss-runtime.Dockerfile
          push: false
          load: false

  envoy_image:
    name: Envoy Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Generate descriptor set
        run: |
          protoc -I. -Iproto -Ithird_party/googleapis \
            --include_imports \
            --include_source_info \
            --experimental_allow_proto3_optional \
            --descriptor_set_out=talon_gateway_proto-descriptor-set.proto.bin \
            proto/gateway.proto

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build envoy image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/envoy-cloudrun.Dockerfile
          push: false
          load: false

  ui:
    name: UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Build UI
        working-directory: ui
        run: pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build UI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/oss-ui.Dockerfile
          push: false
          load: false
          build-args: |
            NEXT_PUBLIC_GATEWAY_URL=http://localhost:18789

  binary_artifacts:
    name: Binary Artifacts
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - cargo
      - runtime_image
      - envoy_image
      - ui
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-x86_64
          - os: macos-14
            artifact_name: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Build release binaries
        run: cargo build --locked --release --bins

      - name: Generate gateway descriptor
        if: runner.os == 'Linux'
        run: |
          protoc -I. -Iproto -Ithird_party/googleapis \
            --include_imports \
            --include_source_info \
            --experimental_allow_proto3_optional \
            --descriptor_set_out=talon_gateway_proto-descriptor-set.proto.bin \
            proto/gateway.proto

      - name: Package binaries
        run: |
          ARTIFACT_DIR="dist/talon-${{ matrix.artifact_name }}"
          mkdir -p "$ARTIFACT_DIR"
          cp target/release/talon-server "$ARTIFACT_DIR"/
          cp target/release/talon-worker "$ARTIFACT_DIR"/
          cp target/release/talon-cli "$ARTIFACT_DIR"/
          cp talon.yaml "$ARTIFACT_DIR"/
          if [ "${RUNNER_OS}" = "Linux" ]; then
            cp talon_gateway_proto-descriptor-set.proto.bin "$ARTIFACT_DIR"/
          fi
          if [ "${RUNNER_OS}" = "macOS" ]; then
            (
              cd "$ARTIFACT_DIR"
              shasum -a 256 talon-server talon-worker talon-cli talon.yaml > SHA256SUMS
            )
          else
            (
              cd "$ARTIFACT_DIR"
              sha256sum \
                talon-server \
                talon-worker \
                talon-cli \
                talon.yaml \
                talon_gateway_proto-descriptor-set.proto.bin > SHA256SUMS
            )
          fi
          tar -C dist -czf "dist/talon-${{ matrix.artifact_name }}-${GITHUB_SHA}.tar.gz" "talon-${{ matrix.artifact_name }}"

      - name: Upload binary artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: talon-${{ matrix.artifact_name }}-${{ github.sha }}
          path: |
            dist/talon-${{ matrix.artifact_name }}-${{ github.sha }}.tar.gz
            dist/talon-${{ matrix.artifact_name }}/SHA256SUMS
          if-no-files-found: error
          retention-days: 14
