name: Talon OSS CI

# Managed by Copybara from impalasys/code.
# Keep this repo-root workflow mirrored from the monorepo overlay.

on:
  pull_request:
  push:
    branches:
      - main
      - "internal-preview/**"

concurrency:
  group: talon-oss-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo_coverage:
    name: Cargo Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Cargo metadata
        run: cargo metadata --locked

      - name: Cargo build
        run: cargo build --locked --bins

      - name: Cargo coverage
        run: |
          cargo llvm-cov --locked \
            --summary-only \
            --ignore-filename-regex '(tests/generated|third_party|ui/proto|src/security/sandbox.rs|src/security/encryption.rs|src/memory/store.rs|src/orchestrator/mod.rs)' \
            --fail-under-lines 35

  python_integration:
    name: Python Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Build Talon binaries
        run: cargo build --locked --bin talon-server --bin talon-worker

      - name: Install Python dependencies
        run: pip install -r tests/requirements.txt

      - name: Run Python integration tests
        run: pytest --cov=tests --cov-report=term-missing --cov-fail-under=70 tests/test_chat.py

  runtime_image:
    name: Runtime Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/oss-runtime.Dockerfile
          push: false
          load: false

  envoy_image:
    name: Envoy Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Generate descriptor set
        run: |
          protoc -I. -Iproto -Ithird_party/googleapis \
            --include_imports \
            --include_source_info \
            --experimental_allow_proto3_optional \
            --descriptor_set_out=talon_gateway_proto-descriptor-set.proto.bin \
            proto/gateway.proto

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build envoy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/envoy-cloudrun.Dockerfile
          push: false
          load: false

  ui_unit:
    name: UI Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Run UI unit tests
        working-directory: ui
        run: pnpm test:unit

      - name: Build UI
        working-directory: ui
        run: pnpm build

  ui_e2e:
    name: UI E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Install Python dependencies
        run: pip install -r tests/requirements.txt

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: ui
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright suite
        working-directory: ui
        run: pnpm test:e2e

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/oss-ui.Dockerfile
          push: false
          load: false
          build-args: |
            NEXT_PUBLIC_GATEWAY_URL=http://localhost:18789
