name: Talon OSS CI

# Managed by Copybara from impalasys/code.
# Keep this repo-root workflow mirrored from the monorepo overlay.

on:
  pull_request:
  push:
    branches:
      - main
      - "internal-preview/**"

concurrency:
  group: talon-oss-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  proto_lint:
    name: Proto Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Reject oneof in resource-facing protos
        run: python3 scripts/check_resource_proto_oneofs.py

  cargo:
    name: Cargo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Cargo metadata
        run: cargo metadata --locked

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo build
        run: cargo build --locked --bins

      - name: Cargo test
        run: cargo test --locked

  runtime_image:
    name: Runtime Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/oss-runtime.Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          load: false
          tags: |
            ghcr.io/impalasys/talon-runtime:latest
            ghcr.io/impalasys/talon-runtime:sha-${{ github.sha }}
          cache-from: type=gha,scope=talon-runtime
          cache-to: type=gha,mode=max,scope=talon-runtime

  acp_harness_image:
    name: ACP Harness Sandbox Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ACP harness sandbox image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/codex-acp.Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          load: false
          tags: |
            ghcr.io/impalasys/talon-acp-harness:latest
            ghcr.io/impalasys/talon-acp-harness:sha-${{ github.sha }}
            ghcr.io/impalasys/talon-codex-acp:latest
            ghcr.io/impalasys/talon-codex-acp:sha-${{ github.sha }}
            ghcr.io/impalasys/talon-claude-code-acp:latest
            ghcr.io/impalasys/talon-claude-code-acp:sha-${{ github.sha }}
            ghcr.io/impalasys/talon-opencode-acp:latest
            ghcr.io/impalasys/talon-opencode-acp:sha-${{ github.sha }}

  ui:
    name: UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Build UI
        working-directory: ui
        run: pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build UI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/oss-ui.Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          load: false
          tags: |
            ghcr.io/impalasys/talon-ui:latest
            ghcr.io/impalasys/talon-ui:sha-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_GATEWAY_URL=http://localhost:50051

  sightline_e2e_screenshots:
    name: Sightline E2E Screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
      SIGHTLINE_SCREENSHOT_DIR: ../target/sightline-e2e-screenshots
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Install Python test dependencies
        run: python -m pip install -r tests/requirements.txt

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: ui
        run: pnpm exec playwright install --with-deps chromium

      - name: Check Docker daemon
        run: docker info

      - name: Capture Sightline E2E screenshots
        working-directory: ui
        run: pnpm test:e2e --grep @screenshots

      - name: Upload Sightline screenshots
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sightline-e2e-screenshots
          path: target/sightline-e2e-screenshots/*.png
          if-no-files-found: error
          retention-days: 14

      - name: Upload dark preview screenshot
        id: upload-preview
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sightline-e2e-dark-preview
          path: target/sightline-e2e-screenshots/sightline-chat-dark.png
          if-no-files-found: error
          retention-days: 14

      - name: Publish inline screenshot preview
        id: preview
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const path = "target/sightline-e2e-screenshots/sightline-chat-dark.png";
            const { owner, repo } = context.repo;
            const issueNumber = context.payload.pull_request.number;
            const previewBranch = `sightline-screenshot-previews/pr-${issueNumber}`;
            const ref = `heads/${previewBranch}`;

            const content = fs.readFileSync(path).toString("base64");
            const { data: blob } = await github.rest.git.createBlob({
              owner,
              repo,
              content,
              encoding: "base64",
            });

            let branchSha;
            let branchExists = true;
            try {
              const { data: previewRef } = await github.rest.git.getRef({ owner, repo, ref });
              branchSha = previewRef.object.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
              branchExists = false;
              const { data: baseRef } = await github.rest.git.getRef({
                owner,
                repo,
                ref: `heads/${context.payload.pull_request.base.ref}`,
              });
              branchSha = baseRef.object.sha;
            }

            const { data: baseCommit } = await github.rest.git.getCommit({
              owner,
              repo,
              commit_sha: branchSha,
            });
            const { data: tree } = await github.rest.git.createTree({
              owner,
              repo,
              base_tree: baseCommit.tree.sha,
              tree: [
                {
                  path: "sightline-chat-dark.png",
                  mode: "100644",
                  type: "blob",
                  sha: blob.sha,
                },
              ],
            });
            const { data: commit } = await github.rest.git.createCommit({
              owner,
              repo,
              message: `Update Sightline screenshot preview for PR #${issueNumber}`,
              tree: tree.sha,
              parents: [branchSha],
            });

            if (branchExists) {
              await github.rest.git.updateRef({
                owner,
                repo,
                ref,
                sha: commit.sha,
                force: true,
              });
            } else {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/${ref}`,
                sha: commit.sha,
              });
            }

            const previewUrl = `https://raw.githubusercontent.com/${owner}/${repo}/refs/heads/${previewBranch}/sightline-chat-dark.png?run=${context.runId}`;
            core.setOutput("url", previewUrl);

      - name: Comment Sightline screenshot links
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const marker = "<!-- sightline-e2e-screenshots -->";
            const artifactUrl = "${{ steps.upload.outputs.artifact-url }}";
            const previewArtifactUrl = "${{ steps.upload-preview.outputs.artifact-url }}";
            const previewUrl = "${{ steps.preview.outputs.url }}";
            const body = [
              marker,
              "## Sightline E2E screenshots",
              "",
              "Connected Sightline chat screenshots were captured for this PR.",
              "",
              `[Download all screenshots](${artifactUrl})`,
              `[Download dark preview only](${previewArtifactUrl})`,
              "",
              "### Dark preview",
              "",
              `![Sightline dark chat composer preview](${previewUrl})`,
              "",
              "The full artifact includes light and dark captures of the connected Sightline chat surface.",
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  sdk:
    name: SDKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.14.3"

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Install Go protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1

      - name: Regenerate SDK clients
        run: scripts/sdk/generate.sh

      - name: Verify SDK package versions
        run: python3 scripts/sdk/check_versions.py

      - name: Verify generated SDK clients are checked in
        run: git diff --exit-code -- sdk scripts buf.gen.sdk.yaml

      - name: Test Go SDKs
        run: |
          (cd sdk/go/talon-client && go test ./...)
          (cd sdk/go/talon-server && go test ./...)

      - name: Test Rust SDKs
        run: |
          cargo fmt --manifest-path sdk/rust/Cargo.toml --all --check
          cargo fmt --manifest-path sdk/examples/rust/Cargo.toml --all --check
          cargo test --manifest-path sdk/rust/Cargo.toml

      - name: Test Java SDKs
        working-directory: sdk/java
        run: gradle test

      - name: Test Python SDKs
        run: |
          python -m pip install -e sdk/python/talon-client -e sdk/python/talon-server pytest
          pytest -q sdk/python/talon-client/tests sdk/python/talon-server/tests

      - name: Test JS SDKs
        run: |
          pnpm install --frozen-lockfile
          pnpm --dir sdk/js check:packages
          pnpm --dir sdk/js typecheck
          pnpm --dir sdk/js test

  python_e2e:
    name: Python E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Check Docker daemon
        run: docker info

      - name: Build Talon binaries
        run: cargo build --locked --features aws --bins

      - name: Install Python test dependencies
        run: python -m pip install -r tests/requirements.txt

      - name: Run Python E2E suite
        run: |
          pytest -q \
            tests/test_a2a_compat.py \
            tests/test_harness.py \
            tests/test_mock_llm.py \
            tests/test_workers.py \
            tests/test_chat.py \
            tests/test_search.py \
            tests/test_resources.py \
            tests/test_workflows.py \
            tests/test_cli_sqlite.py \
            tests/test_acp_sqlite.py

  binary_artifacts:
    name: Binary Artifacts
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs:
      - cargo
      - runtime_image
      - ui
      - sdk
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-x86_64
            sdk_platform: linux-x64
          - os: macos-14
            artifact_name: darwin-arm64
            sdk_platform: darwin-arm64
    runs-on: ${{ matrix.os }}
    environment: desktop
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Build release binaries
        run: cargo build --locked --release --bin talon-server --bin talon-worker --bin talon-node

      - name: Build release CLI
        env:
          TALON_GOOGLE_CLIENT_ID: ${{ secrets.TALON_GOOGLE_CLIENT_ID }}
          TALON_GOOGLE_CLIENT_SECRET: ${{ secrets.TALON_GOOGLE_CLIENT_SECRET }}
        run: cargo build --locked --release --bin talon-cli

      - name: Package binaries
        run: |
          ARTIFACT_DIR="dist/talon-${{ matrix.artifact_name }}"
          mkdir -p "$ARTIFACT_DIR"
          cp target/release/talon-server "$ARTIFACT_DIR"/
          cp target/release/talon-worker "$ARTIFACT_DIR"/
          cp target/release/talon-cli "$ARTIFACT_DIR"/
          cp target/release/talon-node "$ARTIFACT_DIR"/
          cp talon.yaml "$ARTIFACT_DIR"/
          if [ "${RUNNER_OS}" = "macOS" ]; then
            (
              cd "$ARTIFACT_DIR"
              shasum -a 256 talon-server talon-worker talon-cli talon-node talon.yaml > SHA256SUMS
            )
          else
            (
              cd "$ARTIFACT_DIR"
              sha256sum \
                talon-server \
                talon-worker \
                talon-cli \
                talon-node \
                talon.yaml > SHA256SUMS
            )
          fi
          tar -C dist -czf "dist/talon-${{ matrix.artifact_name }}-${GITHUB_SHA}.tar.gz" "talon-${{ matrix.artifact_name }}"
          SDK_NODE_DIR="dist/talon-node-${{ matrix.sdk_platform }}"
          mkdir -p "$SDK_NODE_DIR"
          cp target/release/talon-node "$SDK_NODE_DIR"/
          tar -C dist -czf "dist/talon-node-${{ matrix.sdk_platform }}.tar.gz" "talon-node-${{ matrix.sdk_platform }}"
          if [ "${RUNNER_OS}" = "macOS" ]; then
            shasum -a 256 "dist/talon-node-${{ matrix.sdk_platform }}.tar.gz" > "dist/talon-node-${{ matrix.sdk_platform }}.tar.gz.sha256"
          else
            sha256sum "dist/talon-node-${{ matrix.sdk_platform }}.tar.gz" > "dist/talon-node-${{ matrix.sdk_platform }}.tar.gz.sha256"
          fi

      - name: Upload binary artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: talon-${{ matrix.artifact_name }}-${{ github.sha }}
          path: |
            dist/talon-${{ matrix.artifact_name }}-${{ github.sha }}.tar.gz
            dist/talon-${{ matrix.artifact_name }}/SHA256SUMS
            dist/talon-node-${{ matrix.sdk_platform }}.tar.gz
            dist/talon-node-${{ matrix.sdk_platform }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14
