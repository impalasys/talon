services:
  gateway:
    build:
      context: .
      dockerfile: dockerfiles/oss-runtime.Dockerfile
    command: ["talon-server"]
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - POSTGRES_URL=postgres://talon:password@postgres:5432/talon
      - GCP_PROJECT_ID=talon-local
      - PUBSUB_EMULATOR_HOST=pubsub:8085
      - TALON_SCHEDULER_DRIVER=local_postgres
      - TALON_SCHEDULER_AUTH_TOKEN=${TALON_SCHEDULER_AUTH_TOKEN:-local-scheduler-token}
      - TALON_LOCAL_SCHEDULER_TARGET_URL=http://worker:8081/schedules/fire
      - TALON_LOCAL_SCHEDULER_RUNNER=0
      - OPENAI_API_KEY
      - NOVITA_API_KEY
      - ANTHROPIC_API_KEY
      - GATEWAY_UI_ADDR=0.0.0.0:50052
      - TALON_CONFIG_PATH=/data/talon/talon.compose.yaml
    env_file:
      - .env
    volumes:
      - ./talon.compose.yaml:/data/talon/talon.compose.yaml:ro
    ports:
      - "50051:50051"
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
      pubsub:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "status=$$(curl -s -o /dev/null -w '%{http_code}' -X POST -H 'content-type: application/json' -d '{}' http://localhost:50052/v1/ui/ns/health/agents/health/sessions/health); [ \"$$status\" = \"400\" ] || [ \"$$status\" = \"422\" ]"]
      interval: 5s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: .
      dockerfile: dockerfiles/oss-runtime.Dockerfile
    command: ["talon-worker"]
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - POSTGRES_URL=postgres://talon:password@postgres:5432/talon
      - GCP_PROJECT_ID=talon-local
      - PUBSUB_EMULATOR_HOST=pubsub:8085
      - TALON_SCHEDULER_DRIVER=local_postgres
      - TALON_SCHEDULER_AUTH_TOKEN=${TALON_SCHEDULER_AUTH_TOKEN:-local-scheduler-token}
      - TALON_LOCAL_SCHEDULER_TARGET_URL=http://worker:8081/schedules/fire
      - TALON_LOCAL_SCHEDULER_RUNNER=1
      - OPENAI_API_KEY
      - NOVITA_API_KEY
      - ANTHROPIC_API_KEY
      - PULL_MODE=1
      - TALON_CONFIG_PATH=/data/talon/talon.compose.yaml
    env_file:
      - .env
    volumes:
      - ./talon.compose.yaml:/data/talon/talon.compose.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      pubsub:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    environment:
      # pgadmin-servers.json uses this user and password
      POSTGRES_USER: talon
      POSTGRES_PASSWORD: password
      POSTGRES_DB: talon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talon"]
      interval: 5s
      timeout: 5s
      retries: 5

  init-manifests:
    build:
      context: .
      dockerfile: dockerfiles/oss-runtime.Dockerfile
    depends_on:
      gateway:
        condition: service_healthy
    volumes:
      - ./manifests:/manifests:ro
    env_file:
      - .env
    environment:
      - TALON_GATEWAY=http://gateway:50051
    entrypoint: ["/usr/local/bin/talon-cli"]
    command: ["apply", "-f", "/manifests/default_agent.yaml"]

  init-tutorial-channels:
    profiles: ["tutorial-channels"]
    build:
      context: .
      dockerfile: dockerfiles/oss-runtime.Dockerfile
    depends_on:
      gateway:
        condition: service_healthy
      envoy:
        condition: service_started
    volumes:
      - ./manifests:/manifests:ro
    env_file:
      - .env
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        REST_GATEWAY=http://envoy:8081
        GRPC_GATEWAY=http://gateway:50051
        talon-cli --gateway "$$REST_GATEWAY" --rest apply -f /manifests/examples/channel-collaboration/namespace.yaml
        talon-cli --gateway "$$GRPC_GATEWAY" get template channel-agent-template >/dev/null 2>&1 || talon-cli --gateway "$$GRPC_GATEWAY" apply -f /manifests/examples/channel-collaboration/channel-agent-template.yaml
        talon-cli --gateway "$$GRPC_GATEWAY" apply -f /manifests/examples/channel-collaboration/triage-agent.yaml
        talon-cli --gateway "$$GRPC_GATEWAY" apply -f /manifests/examples/channel-collaboration/scribe-agent.yaml
        talon-cli --gateway "$$GRPC_GATEWAY" apply -f /manifests/examples/channel-collaboration/incident-room.channel.yaml
        talon-cli --gateway "$$GRPC_GATEWAY" apply -f /manifests/examples/channel-collaboration/triage.subscription.yaml
        talon-cli --gateway "$$GRPC_GATEWAY" apply -f /manifests/examples/channel-collaboration/scribe.subscription.yaml

  pubsub:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085

  envoy:
    build:
      context: .
      dockerfile: dockerfiles/envoy.Dockerfile
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "18789:8081"

  pgadmin:
    image: dpage/pgadmin4
    entrypoint: /bin/sh -c "echo 'postgres:5432:*:talon:password' > /tmp/pgpass && chmod 600 /tmp/pgpass && exec /entrypoint.sh"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: adminadmin
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./dockerfiles/pgadmin-servers.json:/pgadmin4/servers.json:ro
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: dockerfiles/oss-ui.Dockerfile
      args:
        NEXT_PUBLIC_GATEWAY_URL: http://localhost:18789
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_GATEWAY_URL=http://localhost:18789
    depends_on:
      gateway:
        condition: service_healthy
      envoy:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  pgdata:
  pgadmin-data:
