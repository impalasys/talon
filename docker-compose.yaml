services:
  gateway:
    build:
      context: .
      dockerfile: dockerfiles/oss-runtime.Dockerfile
    command: ["talon-server"]
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      TALON_CONTROL_DATABASE_URL: postgres://talon:password@postgres:5432/talon
      TALON_DATA_DATABASE_URL: postgres://talon:password@postgres:5432/talon
      TALON_DOCUMENT_DATABASE_URL: postgres://talon:password@postgres:5432/talon
      GCP_PROJECT_ID: talon-local
      PUBSUB_EMULATOR_HOST: pubsub:8085
      TALON_SCHEDULER_DRIVER: local_postgres
      TALON_SCHEDULER_AUTH_TOKEN: ${TALON_SCHEDULER_AUTH_TOKEN:-local-scheduler-token}
      TALON_LOCAL_SCHEDULER_TARGET_URL: http://worker:8081/schedules/fire
      TALON_LOCAL_SCHEDULER_RUNNER: "0"
      OPENAI_API_KEY:
      NOVITA_API_KEY:
      ANTHROPIC_API_KEY:
      TALON_GOOGLE_CLIENT_ID:
      TALON_GOOGLE_WEB_CLIENT_ID:
      TALON_GOOGLE_WEB_CLIENT_SECRET:
      TALON_JWT_PRIVATE_KEY_PEM: *talon-jwt-private-key-pem
      TALON_CONFIG_PATH: /data/talon/talon.docker-compose.yaml
    env_file:
      - path: .env
        required: false
    volumes:
      - ./talon.docker-compose.yaml:/data/talon/talon.docker-compose.yaml:ro
      - talon-objects:/data/talon/objects
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      pubsub:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "printf '\\0\\0\\0\\0\\0' | curl -fsS -X POST -H 'content-type: application/grpc-web+proto' --data-binary @- http://localhost:50051/talon.v1.AuthService/GetSsoConfig >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  init-api-key:
    build:
      context: .
      dockerfile: dockerfiles/oss-runtime.Dockerfile
    depends_on:
      gateway:
        condition: service_healthy
    volumes:
      - talon-auth:/data/talon/auth
    env_file:
      - path: .env
        required: false
    environment:
      TALON_JWT_PRIVATE_KEY_PEM: *talon-jwt-private-key-pem
      TALON_PLATFORM_JWT_ISSUER: https://talon.localhost
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        GRPC_GATEWAY=http://gateway:50051
        API_KEY_FILE=/data/talon/auth/api-key
        if [ ! -s "$$API_KEY_FILE" ]; then
          umask 077
          PRIVATE_KEY_FILE=/tmp/talon-jwt-private-key.pem
          printf '%s\n' "$$TALON_JWT_PRIVATE_KEY_PEM" > "$$PRIVATE_KEY_FILE"
          BOOTSTRAP_TOKEN=$$(talon-cli auth local-token --issuer "$$TALON_PLATFORM_JWT_ISSUER" --private-key-pem-file "$$PRIVATE_KEY_FILE")
          talon-cli --gateway "$$GRPC_GATEWAY" --token "$$BOOTSTRAP_TOKEN" auth api-key create --name docker-compose-root --grant readwrite \
            | awk '/^secret=/{sub(/^secret=/, ""); print}' > "$$API_KEY_FILE.tmp"
          test -s "$$API_KEY_FILE.tmp"
          mv "$$API_KEY_FILE.tmp" "$$API_KEY_FILE"
        fi
        chmod 600 "$$API_KEY_FILE"

  worker:
    build:
      context: .
      dockerfile: dockerfiles/oss-runtime.Dockerfile
    command: ["talon-worker"]
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      TALON_CONTROL_DATABASE_URL: postgres://talon:password@postgres:5432/talon
      TALON_DATA_DATABASE_URL: postgres://talon:password@postgres:5432/talon
      TALON_DOCUMENT_DATABASE_URL: postgres://talon:password@postgres:5432/talon
      GCP_PROJECT_ID: talon-local
      PUBSUB_EMULATOR_HOST: pubsub:8085
      TALON_SCHEDULER_DRIVER: local_postgres
      TALON_SCHEDULER_AUTH_TOKEN: ${TALON_SCHEDULER_AUTH_TOKEN:-local-scheduler-token}
      TALON_LOCAL_SCHEDULER_TARGET_URL: http://worker:8081/schedules/fire
      TALON_LOCAL_SCHEDULER_RUNNER: "1"
      OPENAI_API_KEY:
      NOVITA_API_KEY:
      ANTHROPIC_API_KEY:
      TALON_GOOGLE_CLIENT_ID:
      TALON_GOOGLE_WEB_CLIENT_ID:
      PULL_MODE: "1"
      TALON_JWT_PRIVATE_KEY_PEM: *talon-jwt-private-key-pem
      TALON_CONFIG_PATH: /data/talon/talon.docker-compose.yaml
      TALON_WORKER_ENDPOINT_URL: http://worker:8081
      TALON_WORKER_ENDPOINT_PROTOCOL: grpc
    env_file:
      - path: .env
        required: false
    volumes:
      - ./talon.docker-compose.yaml:/data/talon/talon.docker-compose.yaml:ro
      - talon-objects:/data/talon/objects
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      pubsub:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    environment:
      # pgadmin-servers.json uses this user and password
      POSTGRES_USER: talon
      POSTGRES_PASSWORD: password
      POSTGRES_DB: talon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talon"]
      interval: 5s
      timeout: 5s
      retries: 5

  init-manifests:
    build:
      context: .
      dockerfile: dockerfiles/oss-runtime.Dockerfile
    depends_on:
      init-api-key:
        condition: service_completed_successfully
    volumes:
      - ./manifests:/manifests:ro
      - talon-auth:/data/talon/auth:ro
    env_file:
      - path: .env
        required: false
    environment:
      - TALON_GATEWAY=http://gateway:50051
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        GRPC_GATEWAY=http://gateway:50051
        TALON_API_KEY=$$(cat /data/talon/auth/api-key)
        export TALON_API_KEY
        talon-cli --gateway "$$GRPC_GATEWAY" apply -f /manifests/default_agent.yaml
        talon-cli --gateway "$$GRPC_GATEWAY" --grpc-web apply -f /manifests/examples/chatgpt-app/namespace.yaml
        talon-cli --gateway "$$GRPC_GATEWAY" apply -f /manifests/examples/chatgpt-app/support-docs-template.yaml
        talon-cli --gateway "$$GRPC_GATEWAY" apply -f /manifests/examples/chatgpt-app/support-docs-agent.yaml

  init-tutorial-channels:
    profiles: ["tutorial-channels"]
    build:
      context: .
      dockerfile: dockerfiles/oss-runtime.Dockerfile
    depends_on:
      init-api-key:
        condition: service_completed_successfully
    volumes:
      - ./manifests:/manifests:ro
      - talon-auth:/data/talon/auth:ro
    env_file:
      - path: .env
        required: false
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        GRPC_GATEWAY=http://gateway:50051
        TALON_API_KEY=$$(cat /data/talon/auth/api-key)
        export TALON_API_KEY
        talon-cli --gateway "$$GRPC_GATEWAY" --grpc-web apply -f /manifests/examples/channel-collaboration/namespace.yaml
        talon-cli --gateway "$$GRPC_GATEWAY" get template channel-agent-template >/dev/null 2>&1 || talon-cli --gateway "$$GRPC_GATEWAY" apply -f /manifests/examples/channel-collaboration/channel-agent-template.yaml
        talon-cli --gateway "$$GRPC_GATEWAY" apply -f /manifests/examples/channel-collaboration/triage-agent.yaml
        talon-cli --gateway "$$GRPC_GATEWAY" apply -f /manifests/examples/channel-collaboration/scribe-agent.yaml
        talon-cli --gateway "$$GRPC_GATEWAY" apply -f /manifests/examples/channel-collaboration/incident-room.channel.yaml
        talon-cli --gateway "$$GRPC_GATEWAY" apply -f /manifests/examples/channel-collaboration/triage.subscription.yaml
        talon-cli --gateway "$$GRPC_GATEWAY" apply -f /manifests/examples/channel-collaboration/scribe.subscription.yaml

  pubsub:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085

  pgadmin:
    image: dpage/pgadmin4
    entrypoint: /bin/sh -c "echo 'postgres:5432:*:talon:password' > /tmp/pgpass && chmod 600 /tmp/pgpass && exec /entrypoint.sh"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: adminadmin
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./dockerfiles/pgadmin-servers.json:/pgadmin4/servers.json:ro
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: dockerfiles/oss-ui.Dockerfile
    environment:
      - NODE_ENV=production
      - TALON_OBJECT_STORE_PATH=/data/talon/objects
    volumes:
      - talon-objects:/data/talon/objects
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  pgdata:
  pgadmin-data:
  talon-objects:
  talon-auth:
